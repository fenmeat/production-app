<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FenMeat Production</title>
<style>
:root {
	--red: #C0392B;
	--dark: #1a1a1a;
	--mid: #2d2d2d;
	--card: #f9f9f9;
	--border: #e0e0e0;
	--green: #27AE60;
	--orange: #E67E22;
	--blue: #2980B9;
	--copper: #A0522D;
	--copper-dark: #7a3d20;
	--text: #222;
	--muted: #777;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
	font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
	background: #f0f0f0;
	color: var(--text);
	-webkit-tap-highlight-color: transparent;
}

.header {
	background: var(--dark);
	color: white;
	padding: 14px 16px;
	display: flex;
	justify-content: space-between;
	align-items: center;
}
.header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.3px; }
.header .logo { color: var(--copper); }
.header-right { font-size: 12px; color: #aaa; text-align: right; }

.date-bar {
	background: white;
	padding: 12px 16px;
	display: flex;
	align-items: center;
	gap: 10px;
	border-bottom: 1px solid var(--border);
}
.date-bar label { font-size: 14px; font-weight: 600; }
.date-bar input[type="date"] {
	flex: 1;
	padding: 10px;
	font-size: 16px;
	border: 1px solid var(--border);
	border-radius: 6px;
}

.mode-bar {
	display: flex;
	background: var(--mid);
}
.mode-btn {
	flex: 1;
	padding: 14px 8px;
	border: none;
	background: var(--mid);
	color: #ccc;
	font-size: 14px;
	font-weight: 700;
	cursor: pointer;
}
.mode-btn.active.plan { background: var(--blue); color: white; }
.mode-btn.active.actuals { background: var(--copper); color: white; }

.context-bar {
	background: #FFF6EE;
	border-bottom: 1px solid var(--border);
	padding: 10px 16px;
	font-size: 13px;
	color: var(--copper-dark);
}
.context-bar .routes { font-weight: 700; }
.context-bar .period {
	display: inline-block;
	margin-left: 8px;
	padding: 2px 8px;
	border-radius: 10px;
	background: var(--copper);
	color: white;
	font-size: 11px;
	font-weight: 700;
}
.src-badge {
	display: inline-block;
	padding: 2px 8px;
	border-radius: 10px;
	font-size: 11px;
	font-weight: 700;
	margin-right: 6px;
}
.src-badge.confirmed { background: var(--green); color: white; }
.src-badge.forecast { background: #ddd; color: var(--text); }

.content { padding-bottom: 90px; }

.loading {
	text-align: center;
	padding: 60px 20px;
	color: var(--muted);
}
.spinner {
	width: 28px; height: 28px;
	border: 3px solid var(--border);
	border-top-color: var(--copper);
	border-radius: 50%;
	margin: 0 auto 12px;
	animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.summary-bar {
	background: white;
	display: flex;
	border-bottom: 1px solid var(--border);
}
.summary-item {
	flex: 1;
	text-align: center;
	padding: 14px 8px;
	border-right: 1px solid var(--border);
}
.summary-item:last-child { border-right: none; }
.summary-val { font-size: 22px; font-weight: 700; }
.summary-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.4px; }

.product-header {
	display: grid;
	grid-template-columns: 1fr 80px;
	gap: 8px;
	padding: 8px 16px;
	background: #ececec;
	font-size: 11px;
	font-weight: 700;
	color: var(--muted);
	text-transform: uppercase;
	letter-spacing: 0.4px;
}
.product-header.actuals-mode { grid-template-columns: 1fr 70px 80px; }
.product-header.plan-mode { grid-template-columns: 1fr 64px 64px 70px; }

.product-row {
	display: grid;
	grid-template-columns: 1fr 80px;
	gap: 8px;
	align-items: center;
	padding: 12px 16px;
	background: white;
	border-bottom: 1px solid var(--border);
}
.product-row.actuals-mode { grid-template-columns: 1fr 70px 80px; }
.product-row.plan-mode { grid-template-columns: 1fr 64px 64px 70px; }
.product-row:nth-child(even) { background: #fafafa; }

.product-name { font-size: 14px; font-weight: 600; }
.product-code { font-size: 11px; color: var(--muted); margin-top: 1px; }

.plan-qty {
	text-align: center;
	font-size: 18px;
	font-weight: 700;
	color: var(--blue);
}

.qty-input {
	width: 100%;
	padding: 8px 4px;
	font-size: 16px;
	text-align: center;
	border: 1px solid var(--border);
	border-radius: 6px;
}
.qty-input:focus { outline: none; border-color: var(--copper); }

.produce-qty {
	text-align: center;
	font-size: 18px;
	font-weight: 700;
	color: var(--copper);
}
.produce-batches {
	text-align: center;
	font-size: 10px;
	color: var(--muted);
	font-weight: 600;
	margin-top: 1px;
}

.empty-state {
	text-align: center;
	padding: 60px 24px;
	color: var(--muted);
}
.empty-state .big { font-size: 32px; margin-bottom: 8px; }

.trolley-card {
	background: #FFF6EE;
	border: 1px solid var(--copper);
	border-radius: 8px;
	margin: 12px 16px;
	padding: 14px 16px;
}
.trolley-title {
	font-size: 13px;
	font-weight: 700;
	color: var(--copper-dark);
	margin-bottom: 10px;
}
.trolley-row {
	display: flex;
	justify-content: space-between;
	font-size: 13px;
	padding: 3px 0;
	color: var(--text);
}
.trolley-row b { color: var(--copper-dark); }
.trolley-split {
	display: flex;
	gap: 8px;
	margin-top: 10px;
}
.trolley-split > div {
	flex: 1;
	background: white;
	border-radius: 6px;
	padding: 8px 4px;
	text-align: center;
}
.trolley-split span {
	display: block;
	font-size: 11px;
	color: var(--muted);
	font-weight: 700;
}
.trolley-split b {
	display: block;
	font-size: 18px;
	color: var(--copper-dark);
}
.trolley-leftover {
	margin-top: 10px;
	font-size: 12px;
	color: var(--muted);
	font-style: italic;
}

.stock-na {
	text-align: center;
	font-size: 12px;
	color: var(--muted);
	font-style: italic;
}

.action-bar {
	position: fixed;
	bottom: 0; left: 0; right: 0;
	background: white;
	border-top: 1px solid var(--border);
	padding: 12px 16px;
	display: flex;
	gap: 10px;
}
.btn {
	flex: 1;
	padding: 14px;
	border: none;
	border-radius: 8px;
	font-size: 15px;
	font-weight: 700;
	cursor: pointer;
}
.btn-print { background: var(--mid); color: white; }
.btn-save { background: var(--copper); color: white; }
.btn-save:disabled { background: #ccc; cursor: not-allowed; }

.toast {
	position: fixed;
	top: 16px; left: 50%;
	transform: translateX(-50%);
	background: var(--dark);
	color: white;
	padding: 12px 20px;
	border-radius: 8px;
	font-size: 14px;
	font-weight: 600;
	z-index: 999;
	opacity: 0;
	transition: opacity 0.25s;
	pointer-events: none;
	max-width: 90%;
	text-align: center;
}
.toast.show { opacity: 1; }
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }

@media print {
	.no-print { display: none !important; }
	body { background: white; }
}
</style>
</head>
<body>

<div class="header no-print">
	<h1><span class="logo">FEN</span>MEAT Production</h1>
	<div class="header-right" id="connectionStatus">⚪ Connecting...</div>
</div>

<div class="date-bar no-print">
	<label>📅 Date:</label>
	<input type="date" id="dateInput" onchange="onDateChange()">
</div>

<div class="mode-bar no-print">
	<button class="mode-btn plan active" id="btnPlan" onclick="setMode('plan')">📋 PLAN</button>
	<button class="mode-btn actuals" id="btnActuals" onclick="setMode('actuals')">✅ LOG ACTUALS</button>
</div>

<div class="context-bar no-print" id="contextBar" style="display:none"></div>

<div class="content" id="mainContent">
	<div class="loading">
		<div class="spinner"></div>
		Select a date to begin
	</div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzOvHW0qLnNQUP_kgImFdAXNcU7SMDsA6vYOFfeyyuBrs7j4MOrtWBgvoMv8Wba_A1yYw/exec';
const NEW_SHEET_ID = '1UzTdOY9_Ade5bQ4FsQz5_gMgQNmiWWEwIYDoRUKPpak';

const RUSSIAN_PER_BAG = { R01: 60, R02: 50, R03: 40, R04: 30 };
const RUSSIAN_BATCH_YIELD = 1310;
const RUSSIAN_CODES = ['R01', 'R02', 'R03', 'R04'];

const state = {
	date: '',
	mode: 'plan', // 'plan' or 'actuals'
	routes: [],
	period: '',
	products: [], // {code, name, plannedQty, actualQty, stockQty}
	russianTrolley: null, // {totalLoose, batchesNeeded, looseAvailable, suggestedBags, leftoverLoose}
	sourceByRoute: {} // route -> 'LOAD_LOG' | 'FORECAST'
};

function todayStr() {
	const d = new Date();
	const tz = d.getTimezoneOffset() * 60000;
	return new Date(d - tz).toISOString().split('T')[0];
}

window.onload = function() {
	const dateInput = document.getElementById('dateInput');
	dateInput.value = todayStr();
	state.date = dateInput.value;
	testConnection();
	loadPlanForDate();
};

async function testConnection() {
	const statusEl = document.getElementById('connectionStatus');
	try {
		const url = `${SCRIPT_URL}?action=ping&sheetId=${NEW_SHEET_ID}`;
		const resp = await fetch(url);
		const data = await resp.json();
		statusEl.textContent = data.status === 'ok' ? '🟢 Connected' : '🔴 Error';
	} catch (e) {
		statusEl.textContent = '🔴 Offline';
	}
}

function onDateChange() {
	state.date = document.getElementById('dateInput').value;
	loadPlanForDate();
}

function setMode(mode) {
	state.mode = mode;
	document.getElementById('btnPlan').classList.toggle('active', mode === 'plan');
	document.getElementById('btnActuals').classList.toggle('active', mode === 'actuals');
	render();
}

async function loadPlanForDate() {
	if (!state.date) return;
	document.getElementById('mainContent').innerHTML = `
		<div class="loading"><div class="spinner"></div>Loading production plan...</div>
	`;
	document.getElementById('contextBar').style.display = 'none';

	try {
		const url = `${SCRIPT_URL}?action=getProductionPlan&date=${state.date}&sheetId=${NEW_SHEET_ID}`;
		const resp = await fetch(url);
		const data = await resp.json();

		if (data.status !== 'ok') {
			showToast('⚠️ Could not load plan', 'error');
			return;
		}

		state.routes = data.routes || [];
		state.period = data.period || 'NORMAL';
		state.sourceByRoute = data.sourceByRoute || {};
		state.products = (data.products || []).map(p => ({
			code: p.code, name: p.name, plannedQty: p.qty, actualQty: p.qty, stockQty: 0, bagsPerBatch: 0
		}));

		// Pull current stock levels, batch sizes, and any already-saved actuals for this date
		await loadStockLevels();
		await loadBagsPerBatch();
		await loadActualsForDate();

		state.russianTrolley = calcRussiansTrolley(state.products);

		updateContextBar();
		render();
	} catch (e) {
		showToast('⚠️ Network error', 'error');
	}
}

async function loadStockLevels() {
	try {
		const url = `${SCRIPT_URL}?action=getStockLevels&sheetId=${NEW_SHEET_ID}`;
		const resp = await fetch(url);
		const data = await resp.json();
		if (data.status === 'ok') {
			const stockByCode = {};
			(data.products || []).forEach(p => { stockByCode[p.code] = p.qty; });
			state.products.forEach(p => {
				if (stockByCode[p.code] !== undefined) {
					p.stockQty = stockByCode[p.code];
				}
			});
		}
	} catch (e) {
		// Non-fatal — plan still shows, stock just defaults to 0
	}
}

async function loadBagsPerBatch() {
	try {
		const url = `${SCRIPT_URL}?action=getBagsPerBatch&sheetId=${NEW_SHEET_ID}`;
		const resp = await fetch(url);
		const data = await resp.json();
		if (data.status === 'ok') {
			const bagsByCode = {};
			(data.products || []).forEach(p => { bagsByCode[p.code] = p.bagsPerBatch; });
			state.products.forEach(p => {
				if (bagsByCode[p.code] !== undefined) {
					p.bagsPerBatch = bagsByCode[p.code];
				}
			});
		}
	} catch (e) {
		// Non-fatal — plan still shows, just without batch rounding
	}
}

async function loadActualsForDate() {
	try {
		const url = `${SCRIPT_URL}?action=getProductionLog&date=${state.date}&sheetId=${NEW_SHEET_ID}`;
		const resp = await fetch(url);
		const data = await resp.json();
		if (data.status === 'ok' && data.found) {
			const savedByCode = {};
			data.products.forEach(p => { savedByCode[p.code] = p.actualQty; });
			state.products.forEach(p => {
				if (savedByCode[p.code] !== undefined) {
					p.actualQty = savedByCode[p.code];
				}
			});
		}
	} catch (e) {
		// Non-fatal — plan still shows, actuals just won't be pre-filled
	}
}

function updateContextBar() {
	const bar = document.getElementById('contextBar');
	if (state.routes.length === 0) {
		bar.style.display = 'block';
		bar.innerHTML = `No routes scheduled for this date.`;
		return;
	}
	bar.style.display = 'block';
	const routeBadges = state.routes.map(r => {
		const src = state.sourceByRoute[r];
		const badge = src === 'LOAD_LOG'
			? `<span class="src-badge confirmed">✅ ${r}</span>`
			: `<span class="src-badge forecast">📋 ${r}</span>`;
		return badge;
	}).join(' ');
	bar.innerHTML = `${routeBadges}<span class="period">${state.period.replace('_', ' ')}</span>`;
}

function render() {
	if (state.products.length === 0) {
		document.getElementById('mainContent').innerHTML = `
			<div class="empty-state">
				<div class="big">📭</div>
				No production needed for this date.
			</div>
		`;
		return;
	}

	if (state.mode === 'plan') {
		renderPlan();
	} else {
		renderActuals();
	}
}

function renderPlan() {
	const totalForecast = state.products.reduce((s, p) => s + p.plannedQty, 0);
	const totalStock = state.products.reduce((s, p) => s + (RUSSIAN_CODES.includes(p.code) ? 0 : (p.stockQty || 0)), 0);
	const totalProduce = state.products.reduce((s, p) => s + produceQty(p), 0);

	const rt = state.russianTrolley;
	const trolleyCard = (rt && rt.totalLoose > 0) ? `
		<div class="trolley-card no-print">
			<div class="trolley-title">🌭 Russians Trolley — R6/R5/R4/R3 pooled batches</div>
			<div class="trolley-row"><span>Loose Russians needed</span><b>${rt.totalLoose.toLocaleString()}</b></div>
			<div class="trolley-row"><span>Batches required (1 batch = ${RUSSIAN_BATCH_YIELD.toLocaleString()})</span><b>${rt.batchesNeeded}</b></div>
			<div class="trolley-row"><span>Loose Russians available</span><b>${rt.looseAvailable.toLocaleString()}</b></div>
			<div class="trolley-split">
				<div><span>R6</span><b>${rt.suggestedBags.R01}</b></div>
				<div><span>R5</span><b>${rt.suggestedBags.R02}</b></div>
				<div><span>R4</span><b>${rt.suggestedBags.R03}</b></div>
				<div><span>R3</span><b>${rt.suggestedBags.R04}</b></div>
			</div>
			${rt.leftoverLoose > 0 ? `<div class="trolley-leftover">Leftover loose: ${rt.leftoverLoose} (pack as Jumbo Russian or carry over)</div>` : ''}
		</div>
	` : '';

	const html = `
		${trolleyCard}
		<div class="summary-bar no-print">
			<div class="summary-item">
				<div class="summary-val">${totalForecast}</div>
				<div class="summary-label">Forecast</div>
			</div>
			<div class="summary-item">
				<div class="summary-val">${totalStock}</div>
				<div class="summary-label">In Stock</div>
			</div>
			<div class="summary-item">
				<div class="summary-val" id="totalProduceVal">${totalProduce}</div>
				<div class="summary-label">To Produce</div>
			</div>
		</div>
		<div class="product-header plan-mode">
			<div>PRODUCT</div>
			<div style="text-align:center">FORECAST</div>
			<div style="text-align:center">STOCK</div>
			<div style="text-align:center">PRODUCE</div>
		</div>
		${state.products.map((p, i) => {
			const isRussian = RUSSIAN_CODES.includes(p.code);
			return `
			<div class="product-row plan-mode">
				<div>
					<div class="product-name">${p.name}</div>
					<div class="product-code">${p.code}</div>
				</div>
				<div class="plan-qty">${p.plannedQty}</div>
				<div>
					${isRussian
						? `<div class="stock-na">pooled</div>`
						: `<input type="number" class="qty-input"
							id="stock_${i}" value="${p.stockQty || 0}" min="0"
							oninput="updateStock(${i}, this.value)"
							onfocus="this.select()">`
					}
				</div>
				<div>
					<div class="produce-qty" id="produce_${i}">${produceQty(p)}</div>
					<div class="produce-batches" id="batches_${i}">${batchLabel(p)}</div>
				</div>
			</div>
		`;}).join('')}
		<div class="action-bar no-print">
			<button class="btn btn-print" onclick="window.print()">🖨️ Print</button>
			<button class="btn btn-save" onclick="saveStockLevels()">💾 Save Stock</button>
		</div>
	`;
	document.getElementById('mainContent').innerHTML = html;
}

function calcRussiansTrolley(products) {
	const needLoose = {};
	let totalLoose = 0;
	RUSSIAN_CODES.forEach(code => {
		const p = products.find(pr => pr.code === code);
		const bags = p ? p.plannedQty : 0;
		const loose = bags * RUSSIAN_PER_BAG[code];
		needLoose[code] = loose;
		totalLoose += loose;
	});

	const batchesNeededCount = totalLoose <= 0 ? 0 : Math.ceil(totalLoose / RUSSIAN_BATCH_YIELD);
	const looseAvailable = batchesNeededCount * RUSSIAN_BATCH_YIELD;

	const suggestedBags = {};
	let allocated = 0;
	// R6, R5, R4 get a proportional share of the pool, rounded up
	['R01', 'R02', 'R03'].forEach(code => {
		const share = totalLoose > 0 ? needLoose[code] / totalLoose : 0;
		const allocLoose = looseAvailable * share;
		const bags = Math.ceil(allocLoose / RUSSIAN_PER_BAG[code]);
		suggestedBags[code] = Math.max(0, bags);
		allocated += suggestedBags[code] * RUSSIAN_PER_BAG[code];
	});
	// R3 absorbs whatever's left, in whole bags
	const remainingForR04 = Math.max(0, looseAvailable - allocated);
	suggestedBags['R04'] = Math.floor(remainingForR04 / RUSSIAN_PER_BAG['R04']);
	allocated += suggestedBags['R04'] * RUSSIAN_PER_BAG['R04'];

	const leftoverLoose = Math.max(0, looseAvailable - allocated);

	return { needLoose, totalLoose, batchesNeeded: batchesNeededCount, looseAvailable, suggestedBags, leftoverLoose };
}

function rawNeed(p) {
	return Math.max(0, p.plannedQty - (p.stockQty || 0));
}

function batchesNeeded(p) {
	const bags = p.bagsPerBatch || 0;
	if (bags <= 0) return null;
	const need = rawNeed(p);
	if (need === 0) return 0;
	return Math.ceil(need / bags);
}

function produceQty(p) {
	if (RUSSIAN_CODES.includes(p.code) && state.russianTrolley) {
		return state.russianTrolley.suggestedBags[p.code] || 0;
	}
	const batches = batchesNeeded(p);
	if (batches === null) return rawNeed(p); // no recipe — produce exactly what's needed
	return batches * (p.bagsPerBatch || 0);
}

function batchLabel(p) {
	if (RUSSIAN_CODES.includes(p.code)) {
		return '🌭 pooled batch';
	}
	const batches = batchesNeeded(p);
	if (batches === null || batches === 0) return '';
	return `×${batches} batch${batches > 1 ? 'es' : ''}`;
}

function updateStock(idx, val) {
	state.products[idx].stockQty = parseInt(val) || 0;
	const produceEl = document.getElementById(`produce_${idx}`);
	if (produceEl) produceEl.textContent = produceQty(state.products[idx]);
	const batchesEl = document.getElementById(`batches_${idx}`);
	if (batchesEl) batchesEl.textContent = batchLabel(state.products[idx]);

	const totalStock = state.products.reduce((s, p) => s + (RUSSIAN_CODES.includes(p.code) ? 0 : (p.stockQty || 0)), 0);
	const totalProduce = state.products.reduce((s, p) => s + produceQty(p), 0);
	const totalStockEl = document.querySelectorAll('.summary-val')[1];
	if (totalStockEl) totalStockEl.textContent = totalStock;
	const totalProduceEl = document.getElementById('totalProduceVal');
	if (totalProduceEl) totalProduceEl.textContent = totalProduce;
}

async function saveStockLevels() {
	showToast('💾 Saving stock...', '');

	const rows = state.products.map(p => ({ code: p.code, qty: p.stockQty || 0 }));

	try {
		const resp = await fetch(SCRIPT_URL, {
			method: 'POST',
			headers: {'Content-Type': 'text/plain'},
			body: JSON.stringify({
				action: 'updateStockLevels',
				sheetId: NEW_SHEET_ID,
				rows: rows
			})
		});
		const data = await resp.json();
		if (data.status === 'ok') {
			showToast(`✅ Stock levels saved`, 'success');
		} else {
			showToast('⚠️ ' + (data.message || 'Save failed'), 'error');
		}
	} catch (e) {
		showToast('⚠️ Network error — try again', 'error');
	}
}

function renderActuals() {
	const totalPlanned = state.products.reduce((s, p) => s + p.plannedQty, 0);
	const totalActual = state.products.reduce((s, p) => s + (p.actualQty || 0), 0);

	const html = `
		<div class="summary-bar no-print">
			<div class="summary-item">
				<div class="summary-val">${totalPlanned}</div>
				<div class="summary-label">Planned</div>
			</div>
			<div class="summary-item">
				<div class="summary-val" id="totalActualVal">${totalActual}</div>
				<div class="summary-label">Actual</div>
			</div>
		</div>
		<div class="product-header actuals-mode">
			<div>PRODUCT</div>
			<div style="text-align:center">PLAN</div>
			<div style="text-align:center">ACTUAL</div>
		</div>
		${state.products.map((p, i) => `
			<div class="product-row actuals-mode">
				<div>
					<div class="product-name">${p.name}</div>
					<div class="product-code">${p.code}</div>
				</div>
				<div class="plan-qty">${p.plannedQty}</div>
				<div>
					<input type="number" class="qty-input"
						id="actual_${i}" value="${p.actualQty}" min="0"
						oninput="updateActual(${i}, this.value)"
						onfocus="this.select()">
				</div>
			</div>
		`).join('')}
		<div class="action-bar no-print">
			<button class="btn btn-save" onclick="saveActuals()">💾 Save Actuals</button>
		</div>
	`;
	document.getElementById('mainContent').innerHTML = html;
}

function updateActual(idx, val) {
	state.products[idx].actualQty = parseInt(val) || 0;
	const total = state.products.reduce((s, p) => s + (p.actualQty || 0), 0);
	const totalEl = document.getElementById('totalActualVal');
	if (totalEl) totalEl.textContent = total;
}

async function saveActuals() {
	if (!confirm(`Save actual production for ${state.date}?\n\n${state.products.length} items.`)) return;

	showToast('💾 Saving...', '');

	const rows = state.products.map(p => ({
		code: p.code,
		name: p.name,
		plannedQty: p.plannedQty,
		actualQty: p.actualQty || 0
	}));

	try {
		const resp = await fetch(SCRIPT_URL, {
			method: 'POST',
			headers: {'Content-Type': 'text/plain'},
			body: JSON.stringify({
				action: 'writeProductionLog',
				sheetId: NEW_SHEET_ID,
				date: state.date,
				rows: rows
			})
		});
		const data = await resp.json();
		if (data.status === 'ok') {
			showToast(`✅ Saved ${data.saved} items`, 'success');
		} else {
			showToast('⚠️ ' + (data.message || 'Save failed'), 'error');
		}
	} catch (e) {
		showToast('⚠️ Network error — try again', 'error');
	}
}

function showToast(msg, type) {
	let toast = document.getElementById('toast');
	if (!toast) {
		toast = document.createElement('div');
		toast.id = 'toast';
		toast.className = 'toast';
		document.body.appendChild(toast);
	}
	toast.textContent = msg;
	toast.className = 'toast show' + (type ? ' ' + type : '');
	setTimeout(() => { toast.className = 'toast'; }, 2200);
}
</script>
