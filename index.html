<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FenMeat Production</title>
<style>
:root {
	--red: #C0392B;
	--dark: #1a1a1a;
	--mid: #2d2d2d;
	--card: #f9f9f9;
	--border: #e0e0e0;
	--green: #27AE60;
	--orange: #E67E22;
	--blue: #2980B9;
	--copper: #A0522D;
	--copper-dark: #7a3d20;
	--text: #222;
	--muted: #777;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
	font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
	background: #f0f0f0;
	color: var(--text);
	-webkit-tap-highlight-color: transparent;
}

.header {
	background: var(--dark);
	color: white;
	padding: 14px 16px;
	display: flex;
	justify-content: space-between;
	align-items: center;
}
.header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.3px; }
.header .logo { color: var(--copper); }
.header-right { font-size: 12px; color: #aaa; text-align: right; }

.date-bar {
	background: white;
	padding: 12px 16px;
	display: flex;
	align-items: center;
	gap: 10px;
	border-bottom: 1px solid var(--border);
}
.date-bar label { font-size: 14px; font-weight: 600; }
.date-bar input[type="date"] {
	flex: 1;
	padding: 10px;
	font-size: 16px;
	border: 1px solid var(--border);
	border-radius: 6px;
}

.mode-bar {
	display: flex;
	background: var(--mid);
}
.mode-btn {
	flex: 1;
	padding: 14px 8px;
	border: none;
	background: var(--mid);
	color: #ccc;
	font-size: 14px;
	font-weight: 700;
	cursor: pointer;
}
.mode-btn.active.plan { background: var(--blue); color: white; }
.mode-btn.active.actuals { background: var(--copper); color: white; }

.subtab-bar {
	display: flex;
	overflow-x: auto;
	background: white;
	border-bottom: 1px solid var(--border);
	-webkit-overflow-scrolling: touch;
}
.subtab-btn {
	flex: 1;
	min-width: 76px;
	padding: 12px 6px;
	border: none;
	background: white;
	color: var(--muted);
	font-size: 12px;
	font-weight: 700;
	letter-spacing: 0.3px;
	border-bottom: 3px solid transparent;
	cursor: pointer;
	white-space: nowrap;
}
.subtab-btn.active {
	color: var(--copper-dark);
	border-bottom-color: var(--copper);
	background: #FFF6EE;
}

.needs-input {
	border-color: var(--orange) !important;
	background: #FFF3E0 !important;
}

.prow {
	background: white;
	border-bottom: 1px solid var(--border);
	padding: 14px 16px;
}
.prow-header {
	display: flex;
	align-items: center;
	gap: 10px;
	cursor: pointer;
}
.prow-name-wrap { flex: 1; min-width: 0; }
.prow-name { font-size: 15px; font-weight: 700; }
.prow-code { font-size: 11px; color: var(--muted); margin-left: 6px; font-weight: 600; }
.prow-nums { display: flex; gap: 16px; }
.prow-num { text-align: center; min-width: 40px; }
.prow-num-label {
	display: block;
	font-size: 10px;
	color: var(--muted);
	text-transform: uppercase;
	letter-spacing: 0.3px;
	font-weight: 700;
}
.prow-num-val { display: block; font-size: 17px; font-weight: 700; }
.prow-status {
	min-width: 92px;
	text-align: right;
	font-size: 13px;
	font-weight: 700;
	white-space: nowrap;
}
.prow-status.ok { color: var(--green); }
.prow-status.produce { color: var(--copper-dark); }
.prow-chevron {
	color: var(--muted);
	font-size: 11px;
	transition: transform 0.15s;
	flex-shrink: 0;
}
.prow.expanded .prow-chevron { transform: rotate(180deg); }
.prow-detail {
	display: none;
	margin-top: 14px;
	padding-top: 14px;
	border-top: 1px dashed var(--border);
}
.prow.expanded .prow-detail { display: block; }
.prow-detail-grid {
	display: grid;
	grid-template-columns: 1fr 1fr;
	gap: 12px;
}
.prow-detail-field label {
	display: block;
	font-size: 11px;
	color: var(--muted);
	margin-bottom: 4px;
	font-weight: 700;
	text-transform: uppercase;
	letter-spacing: 0.3px;
}

.context-bar {
	background: #FFF6EE;
	border-bottom: 1px solid var(--border);
	padding: 10px 16px;
	font-size: 13px;
	color: var(--copper-dark);
}
.context-bar .routes { font-weight: 700; }
.context-bar .period {
	display: inline-block;
	margin-left: 8px;
	padding: 2px 8px;
	border-radius: 10px;
	background: var(--copper);
	color: white;
	font-size: 11px;
	font-weight: 700;
}
.src-badge {
	display: inline-block;
	padding: 2px 8px;
	border-radius: 10px;
	font-size: 11px;
	font-weight: 700;
	margin-right: 6px;
}
.src-badge.confirmed { background: var(--green); color: white; }
.src-badge.forecast { background: #ddd; color: var(--text); }

.content { padding-bottom: 90px; }

.loading {
	text-align: center;
	padding: 60px 20px;
	color: var(--muted);
}
.spinner {
	width: 28px; height: 28px;
	border: 3px solid var(--border);
	border-top-color: var(--copper);
	border-radius: 50%;
	margin: 0 auto 12px;
	animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.summary-bar {
	background: white;
	display: flex;
	border-bottom: 1px solid var(--border);
}
.summary-item {
	flex: 1;
	text-align: center;
	padding: 14px 8px;
	border-right: 1px solid var(--border);
}
.summary-item:last-child { border-right: none; }
.summary-val { font-size: 22px; font-weight: 700; }
.summary-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.4px; }

.product-header {
	display: grid;
	grid-template-columns: 1fr 80px;
	gap: 8px;
	padding: 8px 16px;
	background: #ececec;
	font-size: 11px;
	font-weight: 700;
	color: var(--muted);
	text-transform: uppercase;
	letter-spacing: 0.4px;
}
.product-header.actuals-mode { grid-template-columns: 1fr 60px 70px 60px; }
.product-header.plan-mode { grid-template-columns: 1fr 58px 58px 58px 58px; }

.product-row {
	display: grid;
	grid-template-columns: 1fr 80px;
	gap: 8px;
	align-items: center;
	padding: 12px 16px;
	background: white;
	border-bottom: 1px solid var(--border);
}
.product-row.actuals-mode { grid-template-columns: 1fr 60px 70px 60px; }
.product-row.plan-mode { grid-template-columns: 1fr 58px 58px 58px 58px; }
.product-row:nth-child(even) { background: #fafafa; }

.product-name { font-size: 14px; font-weight: 600; }
.product-code { font-size: 11px; color: var(--muted); margin-top: 1px; }

.plan-qty {
	text-align: center;
	font-size: 18px;
	font-weight: 700;
	color: var(--blue);
}

.qty-input {
	width: 100%;
	padding: 8px 4px;
	font-size: 16px;
	text-align: center;
	border: 1px solid var(--border);
	border-radius: 6px;
}
.qty-input:focus { outline: none; border-color: var(--copper); }

.produce-qty {
	text-align: center;
	font-size: 18px;
	font-weight: 700;
	color: var(--copper);
}
.produce-input {
	text-align: center;
	font-size: 16px;
	font-weight: 700;
	color: var(--copper);
	border-color: var(--copper);
}
.produce-batches {
	text-align: center;
	font-size: 10px;
	color: var(--muted);
	font-weight: 600;
	margin-top: 1px;
}

.surplus-qty {
	text-align: center;
	font-size: 16px;
	font-weight: 700;
}
.surplus-pos { color: var(--green); }
.surplus-neg { color: var(--red); }
.surplus-zero { color: var(--muted); }

.empty-state {
	text-align: center;
	padding: 60px 24px;
	color: var(--muted);
}
.empty-state .big { font-size: 32px; margin-bottom: 8px; }

.trolley-card {
	background: #FFF6EE;
	border: 1px solid var(--copper);
	border-radius: 8px;
	margin: 12px 16px;
	padding: 14px 16px;
}
.trolley-title {
	font-size: 13px;
	font-weight: 700;
	color: var(--copper-dark);
	margin-bottom: 10px;
}
.trolley-row {
	display: flex;
	justify-content: space-between;
	font-size: 13px;
	padding: 3px 0;
	color: var(--text);
}
.trolley-row b { color: var(--copper-dark); }
.trolley-split {
	display: flex;
	gap: 8px;
	margin-top: 10px;
}
.trolley-split > div {
	flex: 1;
	background: white;
	border-radius: 6px;
	padding: 8px 4px;
	text-align: center;
}
.trolley-split span {
	display: block;
	font-size: 11px;
	color: var(--muted);
	font-weight: 700;
}
.trolley-split b {
	display: block;
	font-size: 18px;
	color: var(--copper-dark);
}
.trolley-leftover {
	margin-top: 10px;
	font-size: 12px;
	color: var(--muted);
	font-style: italic;
}

.trolley-coldroom-input {
	display: flex;
	justify-content: space-between;
	align-items: center;
	gap: 10px;
	background: white;
	border: 1px solid var(--copper);
	border-radius: 6px;
	padding: 8px 10px;
	margin: 8px 0;
}
.trolley-coldroom-input span {
	font-size: 13px;
	font-weight: 600;
	color: var(--copper-dark);
}
.trolley-coldroom-input small {
	font-weight: 400;
	color: var(--muted);
	display: block;
	font-size: 11px;
}
.trolley-coldroom-input input {
	width: 70px;
	flex-shrink: 0;
}

.trolley-extra {
	background: white;
	border: 1px solid var(--copper);
	border-radius: 6px;
	padding: 8px 10px;
	margin-top: 10px;
}
.trolley-extra-over {
	border-color: var(--red);
	background: #FDECEA;
}
.trolley-extra-title {
	font-size: 12px;
	font-weight: 700;
	color: var(--copper-dark);
	margin-bottom: 6px;
}
.trolley-extra-over .trolley-extra-title { color: #8a2419; }
.trolley-extra-note {
	font-size: 11px;
	color: var(--muted);
	margin: 4px 0 6px;
	font-style: italic;
}

.polony-card {
	background: #F0F7F0;
	border: 1px solid var(--green);
	border-radius: 8px;
	margin: 0 16px 12px;
	padding: 14px 16px;
}
.polony-title {
	font-size: 13px;
	font-weight: 700;
	color: #1a5c1a;
	margin-bottom: 10px;
}
.pc-header, .pc-row {
	display: grid;
	grid-template-columns: 1fr 60px 60px 60px;
	gap: 4px;
	padding: 3px 0;
	font-size: 13px;
}
.pc-label { color: var(--muted); }
.pc-val { text-align: center; }
.pc-header .pc-val { font-weight: 700; font-size: 12px; color: #1a5c1a; line-height: 1.3; }
.pc-divider { border-top: 1px solid var(--border); margin: 6px 0; }
.pc-row-highlight {
	background: white;
	border-radius: 6px;
	padding: 4px 6px;
	margin: 2px 0;
}
.pc-cook { color: var(--copper-dark); }
.pc-ok { color: var(--green); }
.polony-note {
	margin-top: 10px;
	font-size: 12px;
	color: var(--muted);
	font-style: italic;
}

.pt-title {
	font-size: 13px;
	font-weight: 700;
	color: #1a5c1a;
	margin-bottom: 8px;
}
.pt-title small {
	font-weight: 400;
	color: var(--muted);
	font-size: 11px;
}
.pt-progress {
	background: white;
	border-radius: 6px;
	padding: 8px 10px;
	margin-bottom: 10px;
}
.pt-progress-row {
	display: flex;
	justify-content: space-between;
	font-size: 13px;
	padding: 2px 0;
}
.pt-header {
	display: grid;
	grid-template-columns: 16px 1fr 1fr 1fr 56px 18px;
	gap: 4px;
	font-size: 10px;
	font-weight: 700;
	color: #1a5c1a;
	text-transform: uppercase;
	letter-spacing: 0.3px;
	padding-bottom: 4px;
	border-bottom: 1px solid #cfe6cf;
	margin-bottom: 4px;
}
.pt-row {
	display: grid;
	grid-template-columns: 16px 1fr 1fr 1fr 56px 18px;
	gap: 4px;
	align-items: center;
	padding: 6px 0;
	border-bottom: 1px solid #e2f0e2;
}
.pt-row:last-of-type { border-bottom: none; }
.pt-row-over { background: #FDECEA; border-radius: 4px; }
.pt-num {
	font-weight: 700;
	font-size: 12px;
	color: #1a5c1a;
}
.pt-input-group {
	background: white;
	border-radius: 6px;
	padding: 4px 6px;
	display: flex;
	flex-direction: column;
	gap: 2px;
}
.pt-input-group label {
	font-size: 9px;
	text-transform: uppercase;
	color: var(--muted);
	font-weight: 700;
}
.pt-input {
	width: 100%;
	padding: 3px 4px;
	font-size: 13px;
	border: 1px solid var(--border);
	border-radius: 4px;
}
.pt-bags {
	font-size: 10px;
	color: #1a5c1a;
	font-weight: 600;
	text-align: right;
}
.pt-total {
	text-align: center;
	font-size: 12px;
	font-weight: 700;
	color: #1a5c1a;
}
.pt-status {
	font-size: 9px;
	font-weight: 600;
	color: var(--green);
}
.pt-row-over .pt-status { color: var(--red); }

.trolleyplan-card {
	background: #F4F0FF;
	border: 1px solid #7B5EA7;
	border-radius: 8px;
	margin: 0 16px 12px;
	padding: 14px 16px;
}
.trolleyplan-title {
	font-size: 13px;
	font-weight: 700;
	color: #4a3570;
	margin-bottom: 10px;
}
.tp-warning {
	background: #FDECEA;
	border: 1px solid var(--red);
	color: #8a2419;
	border-radius: 6px;
	padding: 8px 10px;
	margin-bottom: 10px;
	font-size: 12px;
	font-weight: 600;
	line-height: 1.4;
}

.tp-req-section {
	background: white;
	border-radius: 6px;
	padding: 8px 10px;
	margin-bottom: 10px;
}
.tp-req-title {
	font-size: 11px;
	font-weight: 700;
	color: #4a3570;
	text-transform: uppercase;
	letter-spacing: 0.3px;
	margin-bottom: 4px;
}
.tp-req-row {
	display: flex;
	justify-content: space-between;
	font-size: 13px;
	padding: 2px 0;
}
.tp-req-row b { color: #4a3570; }
.tp-header {
	display: grid;
	grid-template-columns: 20px 1fr 1fr 46px 20px;
	gap: 6px;
	font-size: 11px;
	font-weight: 700;
	color: #4a3570;
	text-transform: uppercase;
	letter-spacing: 0.3px;
	padding-bottom: 6px;
	border-bottom: 1px solid #d8ccec;
	margin-bottom: 4px;
}
.tp-row {
	display: grid;
	grid-template-columns: 20px 1fr 1fr 46px 20px;
	gap: 6px;
	align-items: center;
	padding: 6px 0;
	border-bottom: 1px solid #ece5f7;
	font-size: 13px;
}
.tp-row:last-of-type { border-bottom: none; }
.tp-row-readonly { opacity: 0.85; }
.tp-readonly-label { font-size: 12px; color: #4a3570; }
.tp-polony-header { margin-top: 10px; }
.tp-num {
	font-weight: 700;
	color: #4a3570;
}
.tp-half {
	background: white;
	border-radius: 6px;
	padding: 4px 6px;
	display: flex;
	flex-direction: column;
	gap: 2px;
}
.tp-select {
	width: 100%;
	padding: 4px;
	font-size: 12px;
	border: 1px solid var(--border);
	border-radius: 4px;
	background: white;
}
.tp-bags {
	font-weight: 700;
	color: #4a3570;
	font-size: 11px;
	text-align: right;
}
.tp-empty {
	color: var(--muted);
	font-style: italic;
	font-size: 12px;
}
.tp-total {
	text-align: center;
	font-weight: 700;
	color: #4a3570;
	font-size: 12px;
}
.tp-remove {
	text-align: center;
	color: var(--red);
	font-weight: 700;
	cursor: pointer;
	font-size: 14px;
}
.tp-actions {
	display: flex;
	flex-wrap: wrap;
	gap: 8px;
	margin-top: 10px;
}
.tp-btn {
	flex: 1;
	min-width: 100px;
	padding: 8px;
	border: 1px solid #7B5EA7;
	border-radius: 6px;
	background: white;
	color: #4a3570;
	font-size: 12px;
	font-weight: 700;
	cursor: pointer;
}
.tp-btn-reset { background: #F4F0FF; }
.tp-btn-save { background: #7B5EA7; color: white; }

.unit-hint {
	text-align: center;
	font-size: 10px;
	color: var(--muted);
	font-weight: 600;
	margin-top: 1px;
	text-transform: uppercase;
	letter-spacing: 0.3px;
}

.coldroom-input {
	margin-top: 6px;
	border-color: #7B5EA7;
	background: #FAF8FF;
}

.stock-na {
	text-align: center;
	font-size: 12px;
	color: var(--muted);
	font-style: italic;
}

.action-bar {
	position: fixed;
	bottom: 0; left: 0; right: 0;
	background: white;
	border-top: 1px solid var(--border);
	padding: 12px 16px;
	display: flex;
	gap: 10px;
}
.btn {
	flex: 1;
	padding: 14px;
	border: none;
	border-radius: 8px;
	font-size: 15px;
	font-weight: 700;
	cursor: pointer;
}
.btn-print { background: var(--mid); color: white; }
.btn-save { background: var(--copper); color: white; }
.btn-save:disabled { background: #ccc; cursor: not-allowed; }

.toast {
	position: fixed;
	top: 16px; left: 50%;
	transform: translateX(-50%);
	background: var(--dark);
	color: white;
	padding: 12px 20px;
	border-radius: 8px;
	font-size: 14px;
	font-weight: 600;
	z-index: 999;
	opacity: 0;
	transition: opacity 0.25s;
	pointer-events: none;
	max-width: 90%;
	text-align: center;
}
.toast.show { opacity: 1; }
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }

#printArea { display: none; }

@media print {
	.no-print { display: none !important; }
	#mainContent { display: none !important; }
	#printArea { display: block !important; }
	body { background: white; }
}

.pp-header {
	display: flex;
	justify-content: space-between;
	align-items: flex-start;
	border-bottom: 3px solid var(--dark);
	padding-bottom: 10px;
	margin-bottom: 16px;
}
.pp-logo {
	font-size: 26px;
	font-weight: 800;
	color: var(--red);
	letter-spacing: 0.5px;
}
.pp-logo span { color: var(--dark); }
.pp-route {
	font-size: 18px;
	font-weight: 700;
	color: var(--dark);
	margin-top: 2px;
}
.pp-period {
	display: inline-block;
	margin-left: 8px;
	padding: 2px 8px;
	border-radius: 10px;
	background: var(--copper);
	color: white;
	font-size: 10px;
	font-weight: 700;
	vertical-align: middle;
}
.pp-date {
	text-align: right;
	font-size: 15px;
	font-weight: 700;
	color: var(--dark);
}
.pp-day {
	font-size: 12px;
	font-weight: 400;
	color: var(--muted);
	margin-top: 2px;
}

.pp-columns {
	display: flex;
	gap: 20px;
	margin-bottom: 18px;
}
.pp-columns > div { flex: 1; }

.pp-table {
	width: 100%;
	border-collapse: collapse;
	font-size: 11px;
}
.pp-table thead th {
	background: var(--dark);
	color: white;
	text-align: left;
	padding: 5px 6px;
	font-size: 10px;
	text-transform: uppercase;
	letter-spacing: 0.3px;
}
.pp-table thead th:nth-child(3),
.pp-table thead th:nth-child(4),
.pp-table thead th:nth-child(5) { text-align: center; }
.pp-table tbody tr:nth-child(even) { background: #f2f2f2; }
.pp-table td {
	padding: 4px 6px;
	border-bottom: 1px solid #ddd;
}
.pp-code { color: var(--muted); font-size: 10px; width: 30px; }
.pp-name { font-weight: 600; }
.pp-produce { text-align: center; font-weight: 700; width: 36px; }
.pp-pack { text-align: center; font-weight: 700; width: 36px; color: var(--copper-dark); }
.pp-actual {
	text-align: center;
	width: 36px;
	border: 1px solid #999 !important;
	background: white;
}

.pp-box {
	border: 2px solid var(--red);
	border-radius: 6px;
	overflow: hidden;
	margin-top: 6px;
}
.pp-box-header {
	background: var(--red);
	color: white;
	font-weight: 700;
	font-size: 13px;
	padding: 8px 12px;
}
.pp-box-body { padding: 12px; }
.pp-subtitle {
	font-size: 12px;
	font-weight: 700;
	color: var(--dark);
	margin: 14px 0 6px;
	text-transform: uppercase;
	letter-spacing: 0.3px;
}
.pp-trolley-table {
	width: 100%;
	border-collapse: collapse;
	font-size: 12px;
}
.pp-trolley-table thead th {
	background: #eee;
	text-align: left;
	padding: 5px 8px;
	font-size: 10px;
	text-transform: uppercase;
	color: var(--muted);
}
.pp-trolley-table td {
	padding: 6px 8px;
	border-bottom: 1px solid #ddd;
}
.pp-tnum { font-weight: 700; width: 24px; }
.pp-empty { font-size: 12px; color: var(--muted); font-style: italic; padding: 4px 0; }

.pp-footer {
	display: flex;
	justify-content: space-between;
	margin-top: 16px;
	font-size: 9px;
	color: var(--muted);
}
</style>
</head>
<body>

<div class="header no-print">
	<h1><span class="logo">FEN</span>MEAT Production</h1>
	<div class="header-right" id="connectionStatus">⚪ Connecting...</div>
</div>

<div class="date-bar no-print">
	<label>📅 Date:</label>
	<input type="date" id="dateInput" onchange="onDateChange()">
</div>

<div class="mode-bar no-print">
	<button class="mode-btn plan active" id="btnPlan" onclick="setMode('plan')">📋 PLAN</button>
	<button class="mode-btn actuals" id="btnActuals" onclick="setMode('actuals')">✅ LOG ACTUALS</button>
</div>

<div class="subtab-bar no-print" id="planSubTabBar">
	<button class="subtab-btn active" id="subtabWors" onclick="setPlanSubTab('wors')">WORS</button>
	<button class="subtab-btn" id="subtabRussians" onclick="setPlanSubTab('russians')">RUSSIANS</button>
	<button class="subtab-btn" id="subtabVienna" onclick="setPlanSubTab('vienna')">VIENNA</button>
	<button class="subtab-btn" id="subtabPolony" onclick="setPlanSubTab('polony')">POLONY</button>
	<button class="subtab-btn" id="subtabTrolleys" onclick="setPlanSubTab('trolleys')">TROLLEYS</button>
</div>

<div class="context-bar no-print" id="contextBar" style="display:none"></div>

<div class="content" id="mainContent">
	<div class="loading">
		<div class="spinner"></div>
		Select a date to begin
	</div>
</div>

<div id="printArea"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzOvHW0qLnNQUP_kgImFdAXNcU7SMDsA6vYOFfeyyuBrs7j4MOrtWBgvoMv8Wba_A1yYw/exec';
const NEW_SHEET_ID = '1UzTdOY9_Ade5bQ4FsQz5_gMgQNmiWWEwIYDoRUKPpak';

const RUSSIAN_PER_BAG = { R01: 60, R02: 50, R03: 40, R04: 30 };
const RUSSIAN_BATCH_YIELD = 1310;
const RUSSIAN_CODES = ['R01', 'R02', 'R03', 'R04'];

const POLONY_BAGS_PER_CASING = { P02: 20, P03: 14, P04: 8 };
const POLONY_CODES = ['P02', 'P03', 'P04'];

const VIENNA_CODES = ['V01', 'V02']; // support Full or Half batches

const SKIP_BATCH_CODES = ['W07']; // Patties: cut from frozen rolls, no batch rounding
// Bought-in / repackaged items — Alex never cooks these, only packs from purchased stock
// (per RECIPES_REF notes). On the printout these belong under PACK, never PRODUCE.
const BOUGHT_IN_CODES = ['C01', 'C02', 'C03', 'S01', 'S02', 'S03', 'O01', 'O02', 'O03'];

// Products whose batches are physically cooked on shared trolleys (2 half-slots per trolley).
// Confirmed scope: Russians (R01-R08, incl. pooled R01-R04) + Vienna/Cheese Vienna only.

// Products with a "Coldroom" input (cooked/unpacked stock, separate from packed Stock):
// R05-R07 + Vienna: measured in BATCHES (can't count individual bags off an uncut trolley) —
// app converts batches × bagsPerBatch internally.
// Polony P02-P04: measured in CASINGS (already the natural batch-equivalent unit).
// R01-R04 (pooled Russians) do NOT get a per-size input here — they use a single "Coldroom
// Batches" input on the Russians Trolley card instead (see russianColdroomBatches in state).
// Excludes R08 (Jumbo, surplus product) and P01 (Pizza Toppings, offcuts only).
const COLDROOM_SCOPE_CODES = ['R05', 'R06', 'R07', 'V01', 'V02', 'P02', 'P03', 'P04'];
const COLDROOM_BATCH_CODES = ['R05', 'R06', 'R07', 'V01', 'V02']; // these convert batches->bags via bagsPerBatch

// Which family a product code belongs to, used to split the PLAN screen into sub-tabs.
// W-codes = Wors, R-codes = Russians (pooled R01-R04 and individual R05-R07), V-codes = Vienna,
// P-codes = Polony (incl. P01 Pizza Toppings, offcuts only).
function productFamily(code) {
	if (code.startsWith('R')) return 'russians';
	if (code.startsWith('V')) return 'vienna';
	if (code.startsWith('P')) return 'polony';
	return 'wors';
}

const state = {
	date: '',
	mode: 'plan', // 'plan' or 'actuals'
	planSubTab: 'wors', // 'wors' | 'russians' | 'vienna' | 'polony' | 'trolleys'
	routes: [],
	period: '',
	products: [], // {code, name, plannedQty, actualQty, stockQty}
	russianTrolley: null, // {totalLoose, batchesNeeded, looseAvailable, suggestedBags, leftoverLoose}
	russianColdroomBatches: 0, // whole/partial batches (1 batch = 1310 loose) already cooked, sitting in coldroom
	polonyPlan: {}, // code -> {bagsNeeded, casingsOnTrolley, bagsAvailable, casingsToMake, pakUitTrolley, nuutTePak, surplusToTrolley}
	batchesRequired: {}, // label -> count, e.g. {RUSSIAN: 2, 'CHEESE RUSSIAN': 1, ...}
	trolleyAssignments: [], // [{half1: label|'', half2: label|''}] — user-editable, seeded from the auto-plan
	polonyTrolleys: [], // [{small, med, long}] casing counts per trolley — user-editable, seeded from auto-fill
	sourceByRoute: {} // route -> 'LOAD_LOG' | 'FORECAST'
};

function todayStr() {
	const d = new Date();
	const tz = d.getTimezoneOffset() * 60000;
	return new Date(d - tz).toISOString().split('T')[0];
}

window.onload = function() {
	const dateInput = document.getElementById('dateInput');
	dateInput.value = todayStr();
	state.date = dateInput.value;
	testConnection();
	loadPlanForDate();
};

async function testConnection() {
	const statusEl = document.getElementById('connectionStatus');
	try {
		const url = `${SCRIPT_URL}?action=ping&sheetId=${NEW_SHEET_ID}`;
		const resp = await fetch(url);
		const data = await resp.json();
		statusEl.textContent = data.status === 'ok' ? '🟢 Connected' : '🔴 Error';
	} catch (e) {
		statusEl.textContent = '🔴 Offline';
	}
}

function onDateChange() {
	state.date = document.getElementById('dateInput').value;
	loadPlanForDate();
}

function setMode(mode) {
	state.mode = mode;
	document.getElementById('btnPlan').classList.toggle('active', mode === 'plan');
	document.getElementById('btnActuals').classList.toggle('active', mode === 'actuals');
	document.getElementById('planSubTabBar').style.display = mode === 'plan' ? 'flex' : 'none';
	render();
}

function setPlanSubTab(tab) {
	state.planSubTab = tab;
	['wors', 'russians', 'vienna', 'polony', 'trolleys'].forEach(t => {
		document.getElementById('subtab' + t.charAt(0).toUpperCase() + t.slice(1))
			.classList.toggle('active', t === tab);
	});
	renderPlan();
}

// Expands/collapses a product row to reveal its Stock/Coldroom/Produce/Surplus detail.
function toggleRow(idx) {
	const row = document.getElementById('prow_' + idx);
	if (row) row.classList.toggle('expanded');
}

// Updates the collapsed row's status pill (✅ Enough / Produce N) — called after anything
// that can change how much of this product needs producing.
function refreshRowStatus(idx) {
	const p = state.products[idx];
	const statusEl = document.getElementById(`status_${idx}`);
	if (statusEl) {
		const produce = displayProduce(p);
		const enough = produce <= 0;
		statusEl.textContent = enough ? '✅ Enough' : 'Produce ' + produce;
		statusEl.className = 'prow-status ' + (enough ? 'ok' : 'produce');
	}
}

async function loadPlanForDate() {
	if (!state.date) return;
	document.getElementById('mainContent').innerHTML = `
		<div class="loading"><div class="spinner"></div>Loading production plan...</div>
	`;
	document.getElementById('contextBar').style.display = 'none';

	try {
		const url = `${SCRIPT_URL}?action=getProductionPlan&date=${state.date}&sheetId=${NEW_SHEET_ID}`;
		const resp = await fetch(url);
		const data = await resp.json();

		if (data.status !== 'ok') {
			showToast('⚠️ Could not load plan', 'error');
			return;
		}

		state.routes = data.routes || [];
		state.period = data.period || 'NORMAL';
		state.sourceByRoute = data.sourceByRoute || {};
		state.products = (data.products || []).map(p => ({
			code: p.code, name: p.name, plannedQty: p.qty, actualQty: p.qty, stockQty: 0, coldroomQty: 0, bagsPerBatch: 0, produceOverride: null
		}));

		// Pull current stock levels and batch sizes first — Produce depends on these
		await loadStockLevels();
		await loadBagsPerBatch();

		state.russianTrolley = calcRussiansTrolley(state.products, state.russianColdroomBatches);
		state.polonyPlan = calcPolonyPlan(state.products);
		state.batchesRequired = calcBatchesRequired(state.products, state.russianTrolley, state.polonyPlan);
		state.trolleyAssignments = buildDefaultTrolleyAssignments(state.batchesRequired);
		state.polonyTrolleys = buildDefaultPolonyTrolleys(state.polonyPlan);
		await loadSavedTrolleyPlan(); // overrides trolleyAssignments, polonyTrolleys, and produceOverride
		state.trolleyAssignments = reconcileTrolleyAssignments(state.trolleyAssignments, state.batchesRequired);

		// Only now is displayProduce(p) meaningful for every product (Stock/Coldroom loaded,
		// Trolley/Polony plans computed, any saved Produce override restored) — so actuals
		// load last, defaulting each row's Actual to what was actually planned to be produced
		// (not the raw sales forecast) unless a real actuals entry was already saved for this date.
		await loadActualsForDate();

		updateContextBar();
		render();
	} catch (e) {
		showToast('⚠️ Network error', 'error');
	}
}

async function loadStockLevels() {
	try {
		const url = `${SCRIPT_URL}?action=getStockLevels&sheetId=${NEW_SHEET_ID}`;
		const resp = await fetch(url);
		const data = await resp.json();
		if (data.status === 'ok') {
			const stockByCode = {};
			const coldroomByCode = {};
			(data.products || []).forEach(p => {
				stockByCode[p.code] = p.qty;
				coldroomByCode[p.code] = p.coldroomQty || 0;
			});
			state.products.forEach(p => {
				if (stockByCode[p.code] !== undefined) {
					p.stockQty = stockByCode[p.code];
				}
				if (coldroomByCode[p.code] !== undefined) {
					p.coldroomQty = coldroomByCode[p.code];
				}
			});
			// RUSSIAN_TROLLEY is a dedicated STOCK row (not one of the 31 active products) —
			// its COLDROOM_STOCK value holds whole/partial batches, not bags
			if (coldroomByCode['RUSSIAN_TROLLEY'] !== undefined) {
				state.russianColdroomBatches = coldroomByCode['RUSSIAN_TROLLEY'];
			}
		}
	} catch (e) {
		// Non-fatal — plan still shows, stock just defaults to 0
	}
}

async function loadBagsPerBatch() {
	try {
		const url = `${SCRIPT_URL}?action=getBagsPerBatch&sheetId=${NEW_SHEET_ID}`;
		const resp = await fetch(url);
		const data = await resp.json();
		if (data.status === 'ok') {
			const bagsByCode = {};
			(data.products || []).forEach(p => { bagsByCode[p.code] = p.bagsPerBatch; });
			state.products.forEach(p => {
				if (bagsByCode[p.code] !== undefined) {
					p.bagsPerBatch = bagsByCode[p.code];
				}
			});
		}
	} catch (e) {
		// Non-fatal — plan still shows, just without batch rounding
	}
}

async function loadActualsForDate() {
	try {
		const url = `${SCRIPT_URL}?action=getProductionLog&date=${state.date}&sheetId=${NEW_SHEET_ID}`;
		const resp = await fetch(url);
		const data = await resp.json();
		const savedByCode = {};
		if (data.status === 'ok' && data.found) {
			data.products.forEach(p => { savedByCode[p.code] = p.actualQty; });
		}
		state.products.forEach(p => {
			p.actualQty = savedByCode[p.code] !== undefined ? savedByCode[p.code] : null;
		});
	} catch (e) {
		// Non-fatal — plan still shows, actuals just won't be pre-filled
	}
}

function updateContextBar() {
	const bar = document.getElementById('contextBar');
	if (state.routes.length === 0) {
		bar.style.display = 'block';
		bar.innerHTML = `No routes scheduled for this date.`;
		return;
	}
	bar.style.display = 'block';
	const routeBadges = state.routes.map(r => {
		const src = state.sourceByRoute[r];
		const badge = src === 'LOAD_LOG'
			? `<span class="src-badge confirmed">✅ ${r}</span>`
			: `<span class="src-badge forecast">📋 ${r}</span>`;
		return badge;
	}).join(' ');
	bar.innerHTML = `${routeBadges}<span class="period">${state.period.replace('_', ' ')}</span>`;
}

function render() {
	if (state.products.length === 0) {
		document.getElementById('mainContent').innerHTML = `
			<div class="empty-state">
				<div class="big">📭</div>
				No production needed for this date.
			</div>
		`;
		return;
	}

	if (state.mode === 'plan') {
		renderPlan();
	} else {
		renderActuals();
	}
}

function printPlan() {
	buildPrintLayout();
	setTimeout(() => window.print(), 50); // let the DOM update before the print dialog opens
}

function buildPrintLayout() {
	const dateObj = new Date(state.date + 'T12:00:00');
	const dayName = dateObj.toLocaleDateString('en-US', { weekday: 'long' });
	const routesLabel = state.routes.length > 0 ? state.routes.join(' + ') : 'No routes scheduled';
	const periodLabel = state.period ? `<span class="pp-period">${state.period.replace('_', ' ')}</span>` : '';

	// Two-column product list, same visual pattern as the Sales App route printout
	const half = Math.ceil(state.products.length / 2);
	const leftProducts = state.products.slice(0, half);
	const rightProducts = state.products.slice(half);

	// Pooled Russians (R01-R04) already blend coldroom + fresh-cooked loose meat into one
	// "bags to pack" number, and bought-in items (Chicken, Six Gun, offal) are never actually
	// cooked — both belong under PACK on the printout, not PRODUCE, to avoid confusion.
	const packOnlyRow = p => RUSSIAN_CODES.includes(p.code) || BOUGHT_IN_CODES.includes(p.code);

	const productRow = p => {
		const packOnly = packOnlyRow(p);
		return `
		<tr>
			<td class="pp-code">${p.code}</td>
			<td class="pp-name">${p.name}</td>
			<td class="pp-produce">${packOnly ? '' : (displayProduce(p) || '')}</td>
			<td class="pp-pack">${packOnly ? (displayProduce(p) || '') : (packToday(p) || '')}</td>
			<td class="pp-actual"></td>
		</tr>`;
	};

	const productTable = products => `
		<table class="pp-table">
			<thead><tr><th>Code</th><th>Product</th><th>Produce</th><th>Pack</th><th>Actual</th></tr></thead>
			<tbody>${products.map(productRow).join('')}</tbody>
		</table>`;

	const trolleyRows = (state.trolleyAssignments || []).map((t, i) => `
		<tr>
			<td class="pp-tnum">${i + 1}</td>
			<td>${t.half1 || '—'}</td>
			<td>${t.half2 || '—'}</td>
		</tr>`).join('');

	const polonyRows = (state.polonyTrolleys || []).map((t, i) => `
		<tr>
			<td class="pp-tnum">${i + 1}</td>
			<td>${t.small || 0}</td>
			<td>${t.med || 0}</td>
			<td>${t.long || 0}</td>
		</tr>`).join('');

	const html = `
		<div class="pp-header">
			<div>
				<div class="pp-logo">FEN<span>MEAT</span></div>
				<div class="pp-route">${routesLabel} ${periodLabel}</div>
			</div>
			<div class="pp-date">
				<div>${state.date}</div>
				<div class="pp-day">${dayName}</div>
			</div>
		</div>

		<div class="pp-columns">
			<div>${productTable(leftProducts)}</div>
			<div>${productTable(rightProducts)}</div>
		</div>

		<div class="pp-box">
			<div class="pp-box-header">PRODUCTION TROLLEY PLAN — ${routesLabel} — ${state.date}</div>
			<div class="pp-box-body">
				${(state.trolleyAssignments && state.trolleyAssignments.length > 0) ? `
					<table class="pp-trolley-table">
						<thead><tr><th>#</th><th>Half 1</th><th>Half 2</th></tr></thead>
						<tbody>${trolleyRows}</tbody>
					</table>
				` : `<div class="pp-empty">No trolleys planned</div>`}

				<div class="pp-subtitle">Polony Trolley (casings)</div>
				${(state.polonyTrolleys && state.polonyTrolleys.length > 0) ? `
					<table class="pp-trolley-table">
						<thead><tr><th>#</th><th>Small</th><th>Med</th><th>Long</th></tr></thead>
						<tbody>${polonyRows}</tbody>
					</table>
				` : `<div class="pp-empty">No Polony trolleys planned</div>`}
			</div>
		</div>

		<div class="pp-footer">
			<span>https://fenmeat.github.io/production-app/</span>
			<span>${new Date().toLocaleString('en-GB')}</span>
		</div>
	`;
	document.getElementById('printArea').innerHTML = html;
}

function renderPlan() {
	// Totals always reflect ALL products, regardless of which sub-tab is open, so the summary
	// bar stays a full-picture overview even while a specific tab is being worked on.
	const totalForecast = state.products.reduce((s, p) => s + p.plannedQty, 0);
	const totalStock = state.products.reduce((s, p) => s + (p.stockQty || 0), 0);
	const totalProduce = state.products.reduce((s, p) => s + displayProduce(p), 0);
	const totalSurplus = state.products.reduce((s, p) => s + surplusQty(p), 0);

	const tab = state.planSubTab;

	const rt = state.russianTrolley;
	const trolleyCardInner = buildTrolleyCardHTML(rt, state.russianColdroomBatches);
	const trolleyCard = tab === 'russians' ? `<div class="trolley-card no-print" id="trolleyCard">${trolleyCardInner}</div>` : '';

	const polonyCardInner = buildPolonyCardHTML(state.polonyPlan);
	const polonyCard = tab === 'polony' ? `<div class="polony-card no-print" id="polonyCard">${polonyCardInner}</div>` : '';

	const trolleyPlanInner = buildTrolleyPlanCardHTML(state.batchesRequired, state.trolleyAssignments, state.polonyTrolleys);
	const trolleyPlanCard = tab === 'trolleys' ? `<div class="trolleyplan-card no-print" id="trolleyPlanCard">${trolleyPlanInner}</div>` : '';

	const summaryBar = `
		<div class="summary-bar no-print">
			<div class="summary-item">
				<div class="summary-val">${totalForecast}</div>
				<div class="summary-label">Forecast</div>
			</div>
			<div class="summary-item">
				<div class="summary-val">${totalStock}</div>
				<div class="summary-label">In Stock</div>
			</div>
			<div class="summary-item">
				<div class="summary-val" id="totalProduceVal">${totalProduce}</div>
				<div class="summary-label">To Produce</div>
			</div>
			<div class="summary-item">
				<div class="summary-val ${totalSurplus < 0 ? 'surplus-neg' : ''}" id="totalSurplusVal">${totalSurplus > 0 ? '+' : ''}${totalSurplus}</div>
				<div class="summary-label">Surplus</div>
			</div>
		</div>
	`;

	// The Trolleys tab is about trolley assignments, not individual products, so it has no
	// product table of its own — the trolleyPlanCard above is the whole tab.
	const productTable = tab === 'trolleys' ? '' : `
		${state.products.map((p, i) => {
			if (productFamily(p.code) !== tab) return '';
			const isPolony = POLONY_CODES.includes(p.code);
			const hasColdroom = COLDROOM_SCOPE_CODES.includes(p.code);
			const coldroomUnit = isPolony ? 'casings' : 'batches';
			const coldroomNeedsInput = hasColdroom && !(p.coldroomQty > 0);
			const produce = displayProduce(p);
			const isEnough = produce <= 0;
			const surplus = surplusQty(p);
			const surplusClass = surplus < 0 ? 'surplus-neg' : (surplus > 0 ? 'surplus-pos' : 'surplus-zero');
			return `
			<div class="prow" id="prow_${i}">
				<div class="prow-header" onclick="toggleRow(${i})">
					<div class="prow-name-wrap">
						<div class="prow-name">${p.name}<span class="prow-code">${p.code}</span></div>
					</div>
					<div class="prow-nums">
						<div class="prow-num"><span class="prow-num-label">Have</span><span class="prow-num-val" id="have_${i}">${p.stockQty || 0}</span></div>
						<div class="prow-num"><span class="prow-num-label">Need</span><span class="prow-num-val">${p.plannedQty}</span></div>
					</div>
					<div class="prow-status ${isEnough ? 'ok' : 'produce'}" id="status_${i}">${isEnough ? '✅ Enough' : 'Produce ' + produce}</div>
					<div class="prow-chevron">▼</div>
				</div>
				<div class="prow-detail">
					<div class="prow-detail-grid">
						<div class="prow-detail-field">
							<label>Stock</label>
							<input type="number" class="qty-input"
								id="stock_${i}" value="${p.stockQty || 0}" min="0"
								oninput="updateStockField(${i}, 'stockQty', this.value)"
								onfocus="this.select()">
							${isPolony ? `<div class="unit-hint">packed</div>` : ''}
						</div>
						${hasColdroom ? `
						<div class="prow-detail-field">
							<label>Coldroom (${coldroomUnit})</label>
							<input type="number" class="qty-input coldroom-input${coldroomNeedsInput ? ' needs-input' : ''}"
								id="coldroom_${i}" value="${p.coldroomQty || 0}" min="0" step="0.5"
								oninput="updateStockField(${i}, 'coldroomQty', this.value)"
								onfocus="this.select()">
							<div class="unit-hint" id="coldroom_hint_${i}">= ${coldroomBagsHint(p)} bags</div>
						</div>` : ''}
						<div class="prow-detail-field">
							<label>Produce</label>
							<input type="number" class="qty-input produce-input"
								id="produce_${i}" value="${produce}" min="0"
								oninput="updateProduceOverride(${i}, this.value)"
								onfocus="this.select()">
							<div class="produce-batches" id="batches_${i}">${batchLabel(p)}</div>
						</div>

	`;

	const html = `

}

// How many loose Russians remain once Alex's actual chosen Produce numbers (including any
// manual overrides) for R6/R5/R4/R3 are accounted for — separate from rt.leftoverLoose, which
// only reflects the auto-suggested allocation's unavoidable rounding waste.
function calcRussianExtraCapacity(rt) {
	let totalChosenLoose = 0;
	RUSSIAN_CODES.forEach(code => {
		const p = state.products.find(pr => pr.code === code);
		if (p) totalChosenLoose += displayProduce(p) * RUSSIAN_PER_BAG[code];
	});
	const remainingLoose = rt.looseAvailable - totalChosenLoose;
	const maxExtra = {};
	RUSSIAN_CODES.forEach(code => {
		maxExtra[code] = remainingLoose > 0 ? Math.floor(remainingLoose / RUSSIAN_PER_BAG[code]) : 0;
	});
	return { totalChosenLoose, remainingLoose, maxExtra };
}

function calcRussiansTrolley(products, coldroomBatches) {
	coldroomBatches = coldroomBatches || 0;
	const needLoose = {};
	let totalLoose = 0;
	RUSSIAN_CODES.forEach(code => {
		const p = products.find(pr => pr.code === code);
		const bagsNeeded = p ? rawNeed(p) : 0;
		const loose = bagsNeeded * RUSSIAN_PER_BAG[code];
		needLoose[code] = loose;
		totalLoose += loose;
	});

	const coldroomLoose = coldroomBatches * RUSSIAN_BATCH_YIELD;
	const shortfall = Math.max(0, totalLoose - coldroomLoose);
	const batchesNeededCount = shortfall <= 0 ? 0 : Math.ceil(shortfall / RUSSIAN_BATCH_YIELD);
	const newLoose = batchesNeededCount * RUSSIAN_BATCH_YIELD;
	const looseAvailable = coldroomLoose + newLoose;

	// Every size gets at least enough whole bags to cover its own need — never shortchanged
	// just because it happens to be processed last. (Old approach: R6/R5/R4 rounded up
	// individually, then R4 only got "whatever's left" — the cumulative rounding from the
	// other three could eat into R4's own share, showing a false shortage even though the
	// pool overall always has enough.)
	const suggestedBags = {};
	RUSSIAN_CODES.forEach(code => {
		suggestedBags[code] = needLoose[code] > 0 ? Math.ceil(needLoose[code] / RUSSIAN_PER_BAG[code]) : 0;
	});
	let allocated = RUSSIAN_CODES.reduce((s, code) => s + suggestedBags[code] * RUSSIAN_PER_BAG[code], 0);

	// Rare edge case: rounding every size up individually asks for slightly more loose than
	// is actually available. Trim 1 bag at a time from the largest bag size first (frees the
	// most loose per bag removed, so it takes the fewest trims and causes least disruption).
	if (allocated > looseAvailable) {
		const byBagSizeDesc = [...RUSSIAN_CODES].sort((a, b) => RUSSIAN_PER_BAG[b] - RUSSIAN_PER_BAG[a]);
		let over = allocated - looseAvailable;
		for (const code of byBagSizeDesc) {
			while (over > 0 && suggestedBags[code] > 0) {
				suggestedBags[code] -= 1;
				allocated -= RUSSIAN_PER_BAG[code];
				over -= RUSSIAN_PER_BAG[code];
			}
			if (over <= 0) break;
		}
	}

	const leftoverLoose = Math.max(0, looseAvailable - allocated);

	return { needLoose, totalLoose, coldroomLoose, batchesNeeded: batchesNeededCount, looseAvailable, suggestedBags, leftoverLoose };
}

function calcPolonyPlan(products) {
	const plan = {};
	POLONY_CODES.forEach(code => {
		const p = products.find(pr => pr.code === code);
		const bagsNeeded = p ? p.plannedQty : 0;
		const packedStock = p ? (p.stockQty || 0) : 0;
		const casingsOnTrolley = p ? (p.coldroomQty || 0) : 0;
		const bagsPerCasing = POLONY_BAGS_PER_CASING[code];

		// Stage 1: net off already-packed finished bags
		const netBagsNeeded = Math.max(0, bagsNeeded - packedStock);

		// Stage 2: cover the remainder from coldroom casings, then cook if still short
		const bagsAvailable = casingsOnTrolley * bagsPerCasing;
		const shortfall = netBagsNeeded - bagsAvailable;
		const casingsToMake = shortfall > 0 ? Math.ceil(shortfall / bagsPerCasing) : 0;
		const pakUitTrolley = Math.min(bagsAvailable, netBagsNeeded);
		const nuutTePak = Math.max(0, netBagsNeeded - bagsAvailable);
		const surplusToTrolley = (casingsToMake * bagsPerCasing) - nuutTePak;
		plan[code] = { bagsNeeded, packedStock, netBagsNeeded, casingsOnTrolley, bagsAvailable, casingsToMake, pakUitTrolley, nuutTePak, surplusToTrolley };
	});
	return plan;
}

function buildPolonyCardHTML(plan) {
	if (!plan || POLONY_CODES.every(c => !plan[c] || plan[c].bagsNeeded === 0)) return '';
	const row = (label, fn) => `

function calcPolonyTrolleyRow(row) {
	const bagsSmall = (row.small || 0) * POLONY_BAGS_PER_CASING.P02;
	const bagsMed = (row.med || 0) * POLONY_BAGS_PER_CASING.P03;
	const bagsLong = (row.long || 0) * POLONY_BAGS_PER_CASING.P04;
	const totalCasings = (row.small || 0) + (row.med || 0) + (row.long || 0);
	const totalBags = bagsSmall + bagsMed + bagsLong;
	const over = totalCasings > POLONY_TROLLEY_CAPACITY;
	return { bagsSmall, bagsMed, bagsLong, totalCasings, totalBags, over };
}

function buildDefaultPolonyTrolleys(plan) {
	let small = plan.P02 ? plan.P02.casingsToMake : 0;
	let med = plan.P03 ? plan.P03.casingsToMake : 0;
	let long = plan.P04 ? plan.P04.casingsToMake : 0;
	const trolleys = [];
	while (small > 0 || med > 0 || long > 0) {
		let remaining = POLONY_TROLLEY_CAPACITY;
		const t = { small: 0, med: 0, long: 0 };
		const takeSmall = Math.min(small, remaining); t.small = takeSmall; small -= takeSmall; remaining -= takeSmall;
		const takeMed = Math.min(med, remaining); t.med = takeMed; med -= takeMed; remaining -= takeMed;
		const takeLong = Math.min(long, remaining); t.long = takeLong; long -= takeLong; remaining -= takeLong;
		trolleys.push(t);
	}
	return trolleys;
}

function buildPolonyTrolleyBuilderHTML(trolleys, plan) {
	trolleys = trolleys || [];
	const assignedSmall = trolleys.reduce((s, t) => s + (t.small || 0), 0);
	const assignedMed = trolleys.reduce((s, t) => s + (t.med || 0), 0);
	const assignedLong = trolleys.reduce((s, t) => s + (t.long || 0), 0);
	const neededSmall = plan.P02 ? plan.P02.casingsToMake : 0;
	const neededMed = plan.P03 ? plan.P03.casingsToMake : 0;
	const neededLong = plan.P04 ? plan.P04.casingsToMake : 0;

	const progressRow = (label, id, assigned, needed) => `
		<div class="pt-progress-row">
			<span>${label}</span>
			<b class="${assigned >= needed ? 'pc-ok' : 'pc-cook'}" id="${id}">${assigned} / ${needed} casings</b>
		</div>`;

	const rows = trolleys.map((t, i) => {
		const calc = calcPolonyTrolleyRow(t);
		return `
			<div class="pt-row ${calc.over ? 'pt-row-over' : ''}" id="pt-row-${i}">
				<div class="pt-num">${i + 1}</div>
				<div class="pt-input-group">
					<label>Small</label>
					<input type="number" class="pt-input" min="0" step="0.5" value="${t.small || 0}" oninput="updatePolonyTrolley(${i}, 'small', this.value)">
					<span class="pt-bags" id="pt-bags-small-${i}">${calc.bagsSmall} bags</span>
				</div>
				<div class="pt-input-group">
					<label>Med</label>
					<input type="number" class="pt-input" min="0" step="0.5" value="${t.med || 0}" oninput="updatePolonyTrolley(${i}, 'med', this.value)">
					<span class="pt-bags" id="pt-bags-med-${i}">${calc.bagsMed} bags</span>
				</div>
				<div class="pt-input-group">
					<label>Long</label>
					<input type="number" class="pt-input" min="0" step="0.5" value="${t.long || 0}" oninput="updatePolonyTrolley(${i}, 'long', this.value)">
					<span class="pt-bags" id="pt-bags-long-${i}">${calc.bagsLong} bags</span>
				</div>
				<div class="pt-total" id="pt-total-${i}">
					${calc.totalCasings}/${POLONY_TROLLEY_CAPACITY}
					<div class="pt-status" id="pt-status-${i}">${calc.over ? `🚫 ${calc.totalCasings - POLONY_TROLLEY_CAPACITY} too many` : '✔ OK'}</div>
				</div>
				<div class="tp-remove no-print" onclick="removePolonyTrolley(${i})" title="Remove trolley">✕</div>
			</div>
		`;
	}).join('');

	return `
		<div class="pt-title">🧊 Polony Trolley Builder <small>(max ${POLONY_TROLLEY_CAPACITY} casings per trolley)</small></div>
		<div class="pt-progress">
			${progressRow('Small (P02)', 'pt-progress-small', assignedSmall, neededSmall)}
			${progressRow('Med (P03)', 'pt-progress-med', assignedMed, neededMed)}
			${progressRow('Long (P04)', 'pt-progress-long', assignedLong, neededLong)}
		</div>
		<div class="pt-header">
			<div>#</div><div>SMALL</div><div>MED</div><div>LONG</div><div>CASINGS</div>
		</div>
		${rows || '<div class="tp-req-row"><span>No trolleys yet — add one below</span></div>'}
		<div class="tp-actions no-print">
			<button class="tp-btn" onclick="addPolonyTrolley()">+ Add Trolley</button>
			<button class="tp-btn tp-btn-reset" onclick="resetPolonyTrolleys()">↺ Reset to Auto-Fill</button>
			<button class="tp-btn tp-btn-save" onclick="saveTrolleyLayout()">💾 Save Layout</button>
		</div>
	`;
}

function refreshPolonyCard() {

// Updates one Polony Trolley Builder cell WITHOUT re-rendering the whole card — a full
// innerHTML replace on every keystroke was destroying and recreating the input element,
// which threw away focus after each character and made the field feel uneditable.
function updatePolonyTrolley(rowIdx, sizeKey, value) {
	if (!state.polonyTrolleys[rowIdx]) return;
	state.polonyTrolleys[rowIdx][sizeKey] = parseFloat(value) || 0;

	const t = state.polonyTrolleys[rowIdx];
	const calc = calcPolonyTrolleyRow(t);

	const bagsSmallEl = document.getElementById(`pt-bags-small-${rowIdx}`);
	if (bagsSmallEl) bagsSmallEl.textContent = calc.bagsSmall + ' bags';
	const bagsMedEl = document.getElementById(`pt-bags-med-${rowIdx}`);
	if (bagsMedEl) bagsMedEl.textContent = calc.bagsMed + ' bags';
	const bagsLongEl = document.getElementById(`pt-bags-long-${rowIdx}`);
	if (bagsLongEl) bagsLongEl.textContent = calc.bagsLong + ' bags';

	const totalEl = document.getElementById(`pt-total-${rowIdx}`);
	if (totalEl) {
		totalEl.childNodes[0].textContent = `${calc.totalCasings}/${POLONY_TROLLEY_CAPACITY} `;
	}
	const statusEl = document.getElementById(`pt-status-${rowIdx}`);
	if (statusEl) {
		statusEl.textContent = calc.over ? `🚫 ${calc.totalCasings - POLONY_TROLLEY_CAPACITY} too many` : '✔ OK';
	}
	const rowEl = document.getElementById(`pt-row-${rowIdx}`);
	if (rowEl) rowEl.classList.toggle('pt-row-over', calc.over);

	// Refresh the top progress summary (Small/Med/Long assigned-vs-needed) across ALL trolleys
	const plan = state.polonyPlan;
	const assignedSmall = state.polonyTrolleys.reduce((s, tr) => s + (tr.small || 0), 0);
	const assignedMed = state.polonyTrolleys.reduce((s, tr) => s + (tr.med || 0), 0);
	const assignedLong = state.polonyTrolleys.reduce((s, tr) => s + (tr.long || 0), 0);
	const neededSmall = plan.P02 ? plan.P02.casingsToMake : 0;
	const neededMed = plan.P03 ? plan.P03.casingsToMake : 0;
	const neededLong = plan.P04 ? plan.P04.casingsToMake : 0;

	const progEl = document.getElementById('pt-progress-small');
	if (progEl) {
		progEl.textContent = `${assignedSmall} / ${neededSmall} casings`;
		progEl.className = assignedSmall >= neededSmall ? 'pc-ok' : 'pc-cook';
	}
	const progMedEl = document.getElementById('pt-progress-med');
	if (progMedEl) {
		progMedEl.textContent = `${assignedMed} / ${neededMed} casings`;
		progMedEl.className = assignedMed >= neededMed ? 'pc-ok' : 'pc-cook';
	}
	const progLongEl = document.getElementById('pt-progress-long');
	if (progLongEl) {
		progLongEl.textContent = `${assignedLong} / ${neededLong} casings`;
		progLongEl.className = assignedLong >= neededLong ? 'pc-ok' : 'pc-cook';
	}
}

function addPolonyTrolley() {
	state.polonyTrolleys.push({ small: 0, med: 0, long: 0 });
	refreshPolonyCard();
}

function removePolonyTrolley(rowIdx) {
	state.polonyTrolleys.splice(rowIdx, 1);
	refreshPolonyCard();
}

function resetPolonyTrolleys() {
	state.polonyTrolleys = buildDefaultPolonyTrolleys(state.polonyPlan);
	refreshPolonyCard();
}

function coldroomBagsFor(p) {
	if (COLDROOM_BATCH_CODES.includes(p.code)) {
		return (p.coldroomQty || 0) * (p.bagsPerBatch || 0);
	}
	return 0; // Polony's coldroom (casings) is handled separately in calcPolonyPlan
}

// How many bags the entered Coldroom quantity actually converts to — shown next to the
// Coldroom input so it's clear at a glance what "2 batches" or "3 casings" means in bags,
// not just an abstract count.
function coldroomBagsHint(p) {
	if (POLONY_CODES.includes(p.code)) {
		return (p.coldroomQty || 0) * (POLONY_BAGS_PER_CASING[p.code] || 0);
	}
	return coldroomBagsFor(p);
}

// Total bags to physically PACK today = everything currently sitting in coldroom for this
// product, PLUS whatever's being freshly produced today (Produce). This is deliberately NOT
// limited to "need" — once a coldroom batch is being packed, the whole batch gets packed
// (and any batches cooked fresh today get packed same-day too), regardless of what the
// Forecast/Stock netting alone would suggest. Example: 1 coldroom batch of Econo Russian
// (22 bags) + 2 fresh batches made today (44 bags) = 66 total to pack, even though the
// Produce number on its own only shows the 44 that still needed cooking.
function packToday(p) {
	if (POLONY_CODES.includes(p.code)) {
		const plan = state.polonyPlan[p.code];
		const coldroomBags = plan ? plan.bagsAvailable : 0;
		return coldroomBags + displayProduce(p);
	}
	if (COLDROOM_BATCH_CODES.includes(p.code)) {
		return coldroomBagsFor(p) + displayProduce(p);
	}
	return 0;
}

// Unclamped need — can go negative when Stock/Coldroom already exceed Forecast. Used only
// for Surplus, where a negative need correctly means "extra stock beyond what's needed".
function netNeed(p) {
	return p.plannedQty - (p.stockQty || 0) - coldroomBagsFor(p);
}

function rawNeed(p) {
	return Math.max(0, netNeed(p)); // clamped at 0 — used for batch rounding / Produce, since you can't "produce negative"
}

function batchesNeeded(p) {
	const bags = p.bagsPerBatch || 0;
	if (bags <= 0) return null;
	const need = rawNeed(p);
	if (need === 0) return 0;
	return Math.ceil(need / bags);
}

// Vienna / Cheese Vienna can be cooked as Full or Half batches — half-batch size
// is approximated as half of the full-batch bag yield (round to nearest bag).
function viennaBatchInfo(p) {
	const bagsPerBatch = p.bagsPerBatch || 0;
	const halfSize = Math.round(bagsPerBatch / 2);
	const need = rawNeed(p);
	if (bagsPerBatch <= 0 || need === 0) {
		return { fullBatches: 0, hasHalf: false, producedBags: 0, halfSize, bagsPerBatch };
	}
	const halfUnitsNeeded = Math.ceil(need / halfSize);
	const fullBatches = Math.floor(halfUnitsNeeded / 2);
	const hasHalf = halfUnitsNeeded % 2 === 1;
	const producedBags = (fullBatches * bagsPerBatch) + (hasHalf ? halfSize : 0);
	return { fullBatches, hasHalf, producedBags, halfSize, bagsPerBatch };
}

function produceQty(p) {
	if (RUSSIAN_CODES.includes(p.code) && state.russianTrolley) {
		return state.russianTrolley.suggestedBags[p.code] || 0;
	}
	if (POLONY_CODES.includes(p.code) && state.polonyPlan[p.code]) {
		const casings = state.polonyPlan[p.code].casingsToMake;
		return casings * (POLONY_BAGS_PER_CASING[p.code] || 0);
	}
	if (VIENNA_CODES.includes(p.code)) {
		return viennaBatchInfo(p).producedBags;
	}
	if (SKIP_BATCH_CODES.includes(p.code)) {
		return rawNeed(p); // no batch rounding — cut from frozen stock as needed
	}
	const batches = batchesNeeded(p);
	if (batches === null) return rawNeed(p); // no recipe — produce exactly what's needed
	return batches * (p.bagsPerBatch || 0);
}

// The number actually shown/used everywhere: Alex's manual override if he's set one,
// otherwise the calculated suggestion. produceQty(p) itself is left untouched so the
// Trolley Plan / Polony Trolley Builder (which compute their own batch counts directly,
// not from this) are never affected by an override here.
function displayProduce(p) {
	return (p.produceOverride !== null && p.produceOverride !== undefined) ? p.produceOverride : produceQty(p);
}

function surplusQty(p) {
	if (POLONY_CODES.includes(p.code) && state.polonyPlan[p.code]) {
		// Polony's coldroom (casings) isn't accounted for by netNeed/coldroomBagsFor at all —
		// it's handled separately in calcPolonyPlan. True surplus = everything that will be
		// available (packed stock + all trolley casings + whatever's newly cooked) vs Forecast.
		const plan = state.polonyPlan[p.code];
		return (plan.packedStock + plan.bagsAvailable + displayProduce(p)) - plan.bagsNeeded;
	}
	return displayProduce(p) - netNeed(p);
}

function updateProduceOverride(idx, val) {
	const p = state.products[idx];
	p.produceOverride = (val === '' || val === null) ? null : (parseInt(val) || 0);

	const surplusEl = document.getElementById(`surplus_${idx}`);
	if (surplusEl) {
		const s = surplusQty(p);
		surplusEl.textContent = (s > 0 ? '+' : '') + s;
		surplusEl.className = 'surplus-qty ' + (s < 0 ? 'surplus-neg' : (s > 0 ? 'surplus-pos' : 'surplus-zero'));
	}
	refreshRowStatus(idx);

	const totalProduce = state.products.reduce((s, pr) => s + displayProduce(pr), 0);
	const totalProduceEl = document.getElementById('totalProduceVal');
	if (totalProduceEl) totalProduceEl.textContent = totalProduce;

	const totalSurplus = state.products.reduce((s, pr) => s + surplusQty(pr), 0);
	const totalSurplusEl = document.getElementById('totalSurplusVal');
	if (totalSurplusEl) {
		totalSurplusEl.textContent = (totalSurplus > 0 ? '+' : '') + totalSurplus;
		totalSurplusEl.className = 'summary-val ' + (totalSurplus < 0 ? 'surplus-neg' : '');
	}

	// Russian codes affect the pooled trolley's extra-capacity section — refresh it
	if (RUSSIAN_CODES.includes(p.code) && state.russianTrolley) {
		const trolleyEl = document.getElementById('trolleyCard');
		if (trolleyEl) trolleyEl.innerHTML = buildTrolleyCardHTML(state.russianTrolley, state.russianColdroomBatches);
	}
	// Polony codes affect the Polony card's Total Available/Surplus rows — refresh it
	if (POLONY_CODES.includes(p.code) && state.polonyPlan[p.code]) {
		const polonyEl = document.getElementById('polonyCard');
		if (polonyEl) polonyEl.innerHTML = buildPolonyCardHTML(state.polonyPlan);
	}
}

function batchLabel(p) {
	if (RUSSIAN_CODES.includes(p.code)) {
		return '🌭 pooled batch';
	}
	if (POLONY_CODES.includes(p.code) && state.polonyPlan[p.code]) {
		const plan = state.polonyPlan[p.code];
		if (plan.casingsToMake === 0) return plan.pakUitTrolley > 0 ? '✅ trolley only' : '';
		return `${plan.casingsToMake} casing${plan.casingsToMake > 1 ? 's' : ''} to cook`;
	}
	if (VIENNA_CODES.includes(p.code)) {
		const fullSize = p.bagsPerBatch || 0;
		if (fullSize <= 0) return '';
		const halfSize = Math.round(fullSize / 2);
		const bags = displayProduce(p); // respects a manual override
		if (bags === 0) return '';
		const fullBatches = Math.floor(bags / fullSize);
		const remainder = bags - (fullBatches * fullSize);
		const hasHalf = remainder >= Math.round(halfSize * 0.75); // treat a near-half remainder as "+half"
		const parts = [];
		if (fullBatches > 0) parts.push(`×${fullBatches} full`);
		if (hasHalf) parts.push('+half');
		return parts.join(' ') || '';
	}
	if (SKIP_BATCH_CODES.includes(p.code)) return '';
	if (p.bagsPerBatch > 0) {
		const batches = Math.round(displayProduce(p) / p.bagsPerBatch); // respects a manual override
		if (batches === 0) return '';
		return `×${batches} batch${batches > 1 ? 'es' : ''}`;
	}
	return '';
}

// POLONY is selectable here for Alex's own reference/bookkeeping, but is NOT part of the
// auto-plan generation or the Batches Required count — the Polony Trolley Builder (in the
// Polony Pack Plan card) is the authoritative place for casing counts per size.
const TROLLEY_BATCH_LABELS = ['RUSSIAN', 'ECONO RUSSIAN', 'CHEESE RUSSIAN', 'BABALAS RUSSIAN', 'VIENNA Full', 'VIENNA Half', 'CHEESE VIENNA Full', 'CHEESE VIENNA Half', 'POLONY'];
const POLONY_TROLLEY_CAPACITY = 10;
const MAX_TROLLEYS_PER_DAY = 8;

function trolleyBatchBags(label) {
	const findP = code => state.products.find(pr => pr.code === code);
	if (label === 'RUSSIAN') return RUSSIAN_BATCH_YIELD;
	if (label === 'ECONO RUSSIAN') { const p = findP('R05'); return p ? (p.bagsPerBatch || 0) : 0; }
	if (label === 'CHEESE RUSSIAN') { const p = findP('R06'); return p ? (p.bagsPerBatch || 0) : 0; }
	if (label === 'BABALAS RUSSIAN') { const p = findP('R07'); return p ? (p.bagsPerBatch || 0) : 0; }
	if (label === 'VIENNA Full') { const p = findP('V01'); return p ? (p.bagsPerBatch || 0) : 0; }
	if (label === 'VIENNA Half') { const p = findP('V01'); return p ? Math.round((p.bagsPerBatch || 0) / 2) : 0; }
	if (label === 'CHEESE VIENNA Full') { const p = findP('V02'); return p ? (p.bagsPerBatch || 0) : 0; }
	if (label === 'CHEESE VIENNA Half') { const p = findP('V02'); return p ? Math.round((p.bagsPerBatch || 0) / 2) : 0; }
	if (label === 'POLONY') return null; // varies by product — no single bag count
	return 0;
}

function calcBatchesRequired(products, russianTrolley, polonyPlan) {
	const req = {};
	req['RUSSIAN'] = (russianTrolley && russianTrolley.batchesNeeded) || 0;

	const r05 = products.find(p => p.code === 'R05');
	req['ECONO RUSSIAN'] = r05 ? (batchesNeeded(r05) || 0) : 0;
	const r06 = products.find(p => p.code === 'R06');
	req['CHEESE RUSSIAN'] = r06 ? (batchesNeeded(r06) || 0) : 0;
	const r07 = products.find(p => p.code === 'R07');
	req['BABALAS RUSSIAN'] = r07 ? (batchesNeeded(r07) || 0) : 0;

	const v01 = products.find(p => p.code === 'V01');
	const v01info = v01 ? viennaBatchInfo(v01) : { fullBatches: 0, hasHalf: false };
	req['VIENNA Full'] = v01info.fullBatches;
	req['VIENNA Half'] = v01info.hasHalf ? 1 : 0;

	const v02 = products.find(p => p.code === 'V02');
	const v02info = v02 ? viennaBatchInfo(v02) : { fullBatches: 0, hasHalf: false };
	req['CHEESE VIENNA Full'] = v02info.fullBatches;
	req['CHEESE VIENNA Half'] = v02info.hasHalf ? 1 : 0;

	// Polony is no longer counted here — see the dedicated Polony Trolley Builder instead

	return req;
}

function buildDefaultTrolleyAssignments(req) {
	// Auto-plan only pairs within compatible groups — never mixes across them
	const RUSSIAN_FAMILY = ['RUSSIAN', 'ECONO RUSSIAN', 'CHEESE RUSSIAN', 'BABALAS RUSSIAN'];
	const VIENNA_FAMILY = ['VIENNA Full', 'VIENNA Half', 'CHEESE VIENNA Full', 'CHEESE VIENNA Half'];

	function buildUnits(labels) {
		const units = [];
		labels.forEach(label => {
			const count = req[label] || 0;
			for (let i = 0; i < count; i++) units.push(label);
		});
		return units;
	}
	function pairUnits(units) {
		const pairs = [];
		for (let i = 0; i < units.length; i += 2) {
			pairs.push({ half1: units[i] || '', half2: units[i + 1] || '' });
		}
		return pairs;
	}

	const russianUnits = buildUnits(RUSSIAN_FAMILY);
	const viennaUnits = buildUnits(VIENNA_FAMILY);

	const allPairs = [...pairUnits(russianUnits), ...pairUnits(viennaUnits)];
	return allPairs.slice(0, MAX_TROLLEYS_PER_DAY);
}

function calcTotalTrolleysNeeded(req) {
	const RUSSIAN_FAMILY = ['RUSSIAN', 'ECONO RUSSIAN', 'CHEESE RUSSIAN', 'BABALAS RUSSIAN'];
	const VIENNA_FAMILY = ['VIENNA Full', 'VIENNA Half', 'CHEESE VIENNA Full', 'CHEESE VIENNA Half'];
	const russianCount = RUSSIAN_FAMILY.reduce((s, l) => s + (req[l] || 0), 0);
	const viennaCount = VIENNA_FAMILY.reduce((s, l) => s + (req[l] || 0), 0);
	return Math.ceil(russianCount / 2) + Math.ceil(viennaCount / 2);
}

// Guarantees the trolley plan always has ENOUGH slots to cover every batch currently
// required — without discarding any existing rows Alex has manually set or reordered.
// Needed because loading a previously-saved plan (or a Produce number changing after the
// plan was last saved) could otherwise leave some required batches with nowhere to be
// cooked. Any shortfall is appended as additional trolley pairs, up to the daily cap.
function reconcileTrolleyAssignments(assignments, req) {
	const RUSSIAN_FAMILY = ['RUSSIAN', 'ECONO RUSSIAN', 'CHEESE RUSSIAN', 'BABALAS RUSSIAN'];
	const VIENNA_FAMILY = ['VIENNA Full', 'VIENNA Half', 'CHEESE VIENNA Full', 'CHEESE VIENNA Half'];
	const trackedLabels = [...RUSSIAN_FAMILY, ...VIENNA_FAMILY];

	const counted = {};
	trackedLabels.forEach(l => counted[l] = 0);
	assignments.forEach(a => {
		if (counted[a.half1] !== undefined) counted[a.half1]++;
		if (counted[a.half2] !== undefined) counted[a.half2]++;
	});

	const missingUnits = [];
	trackedLabels.forEach(label => {
		const shortfall = (req[label] || 0) - counted[label];
		for (let i = 0; i < shortfall; i++) missingUnits.push(label);
	});

	if (missingUnits.length === 0) return assignments;

	const extraPairs = [];
	for (let i = 0; i < missingUnits.length; i += 2) {
		extraPairs.push({ half1: missingUnits[i] || '', half2: missingUnits[i + 1] || '' });
	}

	return assignments.concat(extraPairs).slice(0, MAX_TROLLEYS_PER_DAY);
}

function trolleyHalfSelectHTML(rowIdx, halfKey, currentVal) {
	const options = [''].concat(TROLLEY_BATCH_LABELS);
	return `<select class="tp-select" onchange="updateTrolleyHalf(${rowIdx}, '${halfKey}', this.value)">
		${options.map(o => `<option value="${o}" ${o === currentVal ? 'selected' : ''}>${o || '— empty —'}</option>`).join('')}
	</select>`;
}

function trolleyBagsLabel(label) {
	if (!label) return '';
	if (label === 'POLONY') return 'casing cook';
	return `${trolleyBatchBags(label)} bags`;
}

function buildTrolleyPlanCardHTML(req, assignments, polonyTrolleys) {
	const reqRows = TROLLEY_BATCH_LABELS.filter(l => (req[l] || 0) > 0)
		.map(l => `<div class="tp-req-row"><span>${l}</span><b>${req[l]}</b></div>`).join('');
	const reqSection = `
		<div class="tp-req-section">
			<div class="tp-req-title">Batches required to cook today</div>
			${reqRows || '<div class="tp-req-row"><span>Nothing new to cook</span></div>'}
		</div>
	`;

	const totalNeeded = calcTotalTrolleysNeeded(req);
	const overflowWarning = totalNeeded > MAX_TROLLEYS_PER_DAY ? `
		<div class="tp-warning">⚠️ ${totalNeeded} trolleys needed today, but max capacity is ${MAX_TROLLEYS_PER_DAY} — ${totalNeeded - MAX_TROLLEYS_PER_DAY} trolley${totalNeeded - MAX_TROLLEYS_PER_DAY > 1 ? 's' : ''} won't fit. Choose what to prioritise below, or carry the rest to tomorrow.</div>
	` : '';

	const rows = assignments.map((a, i) => {
		const b1 = trolleyBatchBags(a.half1);
		const b2 = trolleyBatchBags(a.half2);
		const hasPolony = a.half1 === 'POLONY' || a.half2 === 'POLONY';
		const totalDisplay = hasPolony ? '—' : ((b1 || 0) + (b2 || 0));
		return `
			<div class="tp-row">
				<div class="tp-num">${i + 1}</div>
				<div class="tp-half">${trolleyHalfSelectHTML(i, 'half1', a.half1)}<span class="tp-bags">${trolleyBagsLabel(a.half1)}</span></div>
				<div class="tp-half">${trolleyHalfSelectHTML(i, 'half2', a.half2)}<span class="tp-bags">${trolleyBagsLabel(a.half2)}</span></div>
				<div class="tp-total">${totalDisplay}</div>
				<div class="tp-remove no-print" onclick="removeTrolleyRow(${i})" title="Remove trolley">✕</div>
			</div>
		`;
	}).join('');

	// Polony trolleys are built and edited on the POLONY tab's Polony Trolley Builder, not
	// here — these rows are read-only, just so the full day's trolley picture is visible in
	// one place. Only shown if at least one Polony trolley has actually been planned.
	const polonyRows = (polonyTrolleys || []).map((t, i) => {
		const calc = calcPolonyTrolleyRow(t);
		return `
			<div class="tp-row tp-row-readonly">
				<div class="tp-num">P${i + 1}</div>
				<div class="tp-half"><span class="tp-readonly-label">Small ${t.small || 0} / Med ${t.med || 0} / Long ${t.long || 0}</span></div>
				<div class="tp-half"><span class="tp-readonly-label">(edit on POLONY tab)</span></div>
				<div class="tp-total">${calc.totalCasings} casings</div>
				<div></div>
			</div>
		`;
	}).join('');
	const polonySection = polonyRows ? `
		<div class="tp-header tp-polony-header">
			<div>#</div><div>POLONY TROLLEY</div><div></div><div>CASINGS</div>
		</div>
		${polonyRows}
	` : '';

	return `
		<div class="trolleyplan-title">🛒 Production Trolley Plan — editable (${assignments.length}/${MAX_TROLLEYS_PER_DAY} trolleys)</div>
		${overflowWarning}
		${reqSection}
		<div class="tp-header">
			<div>#</div><div>HALF 1</div><div>HALF 2</div><div>BAGS</div>
		</div>
		${rows || '<div class="tp-req-row"><span>No trolleys yet — add one below</span></div>'}
		${polonySection}
		<div class="tp-actions no-print">
			<button class="tp-btn" onclick="addTrolleyRow()">+ Add Trolley</button>
			<button class="tp-btn tp-btn-reset" onclick="resetTrolleyPlan()">↺ Reset to Auto-Plan</button>
			<button class="tp-btn tp-btn-save" onclick="saveTrolleyLayout()">💾 Save Layout</button>
		</div>
	`;
}

function refreshTrolleyPlanCard() {
	state.batchesRequired = calcBatchesRequired(state.products, state.russianTrolley, state.polonyPlan);
	state.trolleyAssignments = reconcileTrolleyAssignments(state.trolleyAssignments, state.batchesRequired);
	const tpEl = document.getElementById('trolleyPlanCard');
	if (tpEl) tpEl.innerHTML = buildTrolleyPlanCardHTML(state.batchesRequired, state.trolleyAssignments, state.polonyTrolleys);
}

function updateTrolleyHalf(rowIdx, halfKey, value) {
	if (!state.trolleyAssignments[rowIdx]) return;
	state.trolleyAssignments[rowIdx][halfKey] = value;
	refreshTrolleyPlanCard();
}

function addTrolleyRow() {
	state.trolleyAssignments.push({ half1: '', half2: '' });
	refreshTrolleyPlanCard();
}

function removeTrolleyRow(rowIdx) {
	state.trolleyAssignments.splice(rowIdx, 1);
	refreshTrolleyPlanCard();
}

function resetTrolleyPlan() {
	state.trolleyAssignments = buildDefaultTrolleyAssignments(state.batchesRequired);
	refreshTrolleyPlanCard();
}

async function loadSavedTrolleyPlan() {
	try {
		const url = `${SCRIPT_URL}?action=getTrolleyPlan&date=${state.date}&sheetId=${NEW_SHEET_ID}`;
		const resp = await fetch(url);
		const data = await resp.json();
		if (data.status === 'ok' && data.found && data.assignments) {
			if (Array.isArray(data.assignments)) {
				// Backward compatibility with saves made before the Polony Trolley Builder existed
				if (data.assignments.length > 0) state.trolleyAssignments = data.assignments;
			} else {
				if (Array.isArray(data.assignments.trolleyAssignments) && data.assignments.trolleyAssignments.length > 0) {
					state.trolleyAssignments = data.assignments.trolleyAssignments;
				}
				if (Array.isArray(data.assignments.polonyTrolleys)) {
					state.polonyTrolleys = data.assignments.polonyTrolleys;
				}
				if (data.assignments.produceOverrides && typeof data.assignments.produceOverrides === 'object') {
					const overrides = data.assignments.produceOverrides;
					state.products.forEach(p => {
						if (overrides[p.code] !== undefined) p.produceOverride = overrides[p.code];
					});
				}
			}
		}
	} catch (e) {
		// Non-fatal — falls back to the freshly-built auto-plan
	}
}

function updateStockField(idx, field, val) {
	state.products[idx][field] = field === 'coldroomQty' ? (parseFloat(val) || 0) : (parseInt(val) || 0);

	const haveEl = document.getElementById(`have_${idx}`);
	if (haveEl) haveEl.textContent = state.products[idx].stockQty || 0;

	if (field === 'coldroomQty') {
		const hintEl = document.getElementById(`coldroom_hint_${idx}`);
		if (hintEl) hintEl.textContent = `= ${coldroomBagsHint(state.products[idx])} bags`;
	}

	// If this is a Russian code, recalculate the whole trolley and refresh all Russian rows
	if (RUSSIAN_CODES.includes(state.products[idx].code)) {
		state.russianTrolley = calcRussiansTrolley(state.products, state.russianColdroomBatches);
		const trolleyEl = document.getElementById('trolleyCard');
		if (trolleyEl) {
			trolleyEl.innerHTML = buildTrolleyCardHTML(state.russianTrolley, state.russianColdroomBatches);
		}
		// Update all four Russian produce/batch/surplus cells
		state.products.forEach((p, i) => {
			if (RUSSIAN_CODES.includes(p.code)) refreshProduceRow(i);
		});
	} else if (POLONY_CODES.includes(state.products[idx].code)) {
		// Recalculate polony plan and refresh the polony card + this product's row
		state.polonyPlan = calcPolonyPlan(state.products);
		const polonyEl = document.getElementById('polonyCard');
		if (polonyEl) polonyEl.innerHTML = buildPolonyCardHTML(state.polonyPlan);
		// Update produce/batch/surplus cells for all polony rows
		state.products.forEach((p, i) => {
			if (POLONY_CODES.includes(p.code)) refreshProduceRow(i);
		});
	} else {
		refreshProduceRow(idx);
	}

	const totalStock = state.products.reduce((s, p) => s + (p.stockQty || 0), 0);
	const totalProduce = state.products.reduce((s, p) => s + displayProduce(p), 0);
	const totalStockEl = document.querySelectorAll('.summary-val')[1];
	if (totalStockEl) totalStockEl.textContent = totalStock;
	const totalProduceEl = document.getElementById('totalProduceVal');
	if (totalProduceEl) totalProduceEl.textContent = totalProduce;
	const totalSurplus = state.products.reduce((s, p) => s + surplusQty(p), 0);
	const totalSurplusEl = document.getElementById('totalSurplusVal');
	if (totalSurplusEl) {
		totalSurplusEl.textContent = (totalSurplus > 0 ? '+' : '') + totalSurplus;
		totalSurplusEl.className = 'summary-val ' + (totalSurplus < 0 ? 'surplus-neg' : '');
	}

	// Batches Required summary always stays live; manual trolley assignments are preserved
	refreshTrolleyPlanCard();
}

// Refreshes one row's Produce input (only if Alex hasn't manually overridden it), batch
// label, and Surplus cell — used after any Stock/Coldroom change.
function refreshProduceRow(idx) {
	const p = state.products[idx];
	const produceEl = document.getElementById(`produce_${idx}`);
	if (produceEl) produceEl.value = displayProduce(p);
	const batchesEl = document.getElementById(`batches_${idx}`);
	if (batchesEl) batchesEl.textContent = batchLabel(p);
	refreshRowStatus(idx);
	const surplusEl = document.getElementById(`surplus_${idx}`);
	if (surplusEl) {
		const s = surplusQty(p);
		surplusEl.textContent = (s > 0 ? '+' : '') + s;
		surplusEl.className = 'surplus-qty ' + (s < 0 ? 'surplus-neg' : (s > 0 ? 'surplus-pos' : 'surplus-zero'));
	}
}

function updateRussianColdroomBatches(val) {
	state.russianColdroomBatches = parseFloat(val) || 0;
	state.russianTrolley = calcRussiansTrolley(state.products, state.russianColdroomBatches);

	const trolleyEl = document.getElementById('trolleyCard');
	if (trolleyEl) {
		trolleyEl.innerHTML = buildTrolleyCardHTML(state.russianTrolley, state.russianColdroomBatches);
		const input = document.getElementById('russianColdroomInput');
		if (input) {
			input.focus();
			const len = input.value.length;
			input.setSelectionRange(len, len);
		}
	}

	// R01-R04 produce/batch/surplus cells depend on the trolley allocation
	state.products.forEach((p, i) => {
		if (RUSSIAN_CODES.includes(p.code)) refreshProduceRow(i);
	});

	const totalProduce = state.products.reduce((s, p) => s + displayProduce(p), 0);
	const totalProduceEl = document.getElementById('totalProduceVal');
	if (totalProduceEl) totalProduceEl.textContent = totalProduce;
	const totalSurplus = state.products.reduce((s, p) => s + surplusQty(p), 0);
	const totalSurplusEl = document.getElementById('totalSurplusVal');
	if (totalSurplusEl) {
		totalSurplusEl.textContent = (totalSurplus > 0 ? '+' : '') + totalSurplus;
		totalSurplusEl.className = 'summary-val ' + (totalSurplus < 0 ? 'surplus-neg' : '');
	}

	// Trolley Plan Batches Required summary also depends on the Russians pool's batch count
	refreshTrolleyPlanCard();
}

async function saveTrolleyLayout() {
	await saveAll();

async function saveStockLevels() {
